<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Retro Cam - Shiretoko Final v2</title>
    <style>
        :root { --body-bg: #1a1a1a; --accent: #ffae00; --panel-bg: #252525; }
        body { margin: 0; padding: 0; background-color: var(--body-bg); color: white; font-family: 'Courier New', Courier, monospace; display: flex; height: 100dvh; width: 100dvw; overflow: hidden; flex-direction: row; }

        /* 左：プレビュー + ミッションガイド */
        .left-section { flex: 1.2; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; background: #000; padding-left: env(safe-area-inset-left); }
        .viewfinder-container { width: 160px; height: 106px; border: 2px solid #333; border-radius: 4px; overflow: hidden; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scale(var(--zoom-level, 1)); }
        video.selfie { transform: scale(var(--zoom-level, 1)) scaleX(-1); }

        /* 常時ミッションガイド（はみ出し防止修正） */
        #mission-guide {
            position: absolute; top: 10px; width: 85%; max-width: 280px; 
            background: rgba(0,0,0,0.85); border: 1px solid var(--accent); border-radius: 5px; 
            padding: 6px 10px; text-align: center; z-index: 10; pointer-events: none;
            box-sizing: border-box;
        }
        .guide-label { font-size: 8px; color: var(--accent); margin-bottom: 2px; letter-spacing: 1px; }
        .guide-title { font-size: 11px; font-weight: bold; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* 中：設定 */
        .mid-section { width: 190px; background-color: var(--panel-bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; border-left: 1px solid #111; border-right: 1px solid #111; }
        .sub-btn { background: #444; color: #eee; border: 1px solid #666; padding: 10px; border-radius: 6px; font-size: 10px; cursor: pointer; width: 85%; }
        .car-select { background: #000; color: var(--accent); border: 1px solid var(--accent); padding: 8px; border-radius: 4px; font-size: 12px; width: 85%; text-align: center; }
        .flash-on { background: var(--accent) !important; color: #000 !important; font-weight: bold; }

        /* 右：撮影 */
        .right-section { width: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: var(--panel-bg); padding-right: env(safe-area-inset-right); }
        .counter-group { text-align: center; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; }
        .counter { font-size: 2.5rem; color: var(--accent); font-weight: bold; line-height: 1; }
        #shutter { width: 85px; height: 85px; border-radius: 50%; border: 6px solid #222; background: #d00; box-shadow: 0 6px 0 #600; cursor: pointer; margin-top: 20px; }
        #shutter:disabled { background: #333; box-shadow: none; opacity: 0.3; filter: grayscale(1); }

        #status-msg { position: fixed; bottom: 5px; width: 100%; text-align: center; font-size: 9px; color: #888; pointer-events: none; }
        canvas { display: none; }
    </style>
</head>
<body>

    <div class="left-section">
        <div id="mission-guide">
            <div class="guide-label">CURRENT MISSION</div>
            <div id="guide-title" class="guide-title">チームを選択してください</div>
        </div>
        <div class="viewfinder-container"><video id="video" autoplay playsinline></video></div>
        <div id="timer-display" style="visibility: hidden; position: absolute; font-size: 3rem; color: var(--accent); z-index: 20;">5</div>
    </div>

    <div class="mid-section">
        <select id="carSelect" class="car-select">
            <option value="">チーム未選択</option>
            <option value="A">Aチーム</option><option value="B">Bチーム</option><option value="C">Cチーム</option>
        </select>
        <button class="sub-btn" id="missionBtn">全ミッションを確認</button>
        <button class="sub-btn" id="flashBtn">FLASH OFF</button>
        <button class="sub-btn" id="switchBtn">カメラ切替</button>
        <button class="sub-btn" id="powerBtn">CAMERA ON</button>
        <div style="text-align: center; width: 100%;">
            <label style="font-size: 8px; color: #888;">ZOOM</label><br>
            <input type="range" id="zoomRange" min="1" max="3" step="0.1" value="1" style="width:80%; accent-color: var(--accent);">
        </div>
    </div>

    <div class="right-section">
        <div class="counter-group" id="resetTrigger">
            <div class="counter" id="counter">34</div>
            <div style="font-size: 9px; color: #888;">REMAINING</div>
        </div>
        <button id="shutter" disabled></button>
        <button class="sub-btn" id="timerBtn" style="margin-top:20px; width:120px;">5秒タイマー</button>
    </div>

    <div id="status-msg">INITIALIZING...</div>
    <canvas id="canvas"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getStorage, ref, uploadBytes } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Firebase Config (適宜入力)
         // --- 1. Firebase情報を入力してください ---
        const firebaseConfig = {
            apiKey: "AIzaSyDHqQDeEMrFV09YI0n_ARr1Tzta5aqmE2U",
            authDomain: "my-retro-cam.firebaseapp.com",
            projectId: "my-retro-cam",
            storageBucket: "my-retro-cam.firebasestorage.app",
            messagingSenderId: "700098109654",
            appId: "1:700098109654:web:9d679cbd092c1376642977"
        };
        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);
        const auth = getAuth(app);

        // IndexedDB
        const dbName = "RetroCamFinalDB";
        const storeName = "photoQueue";
        let db;
        const dbRequest = indexedDB.open(dbName, 1);
        dbRequest.onupgradeneeded = e => e.target.result.createObjectStore(storeName, { keyPath: "id", autoIncrement: true });
        dbRequest.onsuccess = e => { db = e.target.result; syncPhotos(); };

        const missionMap = [
            { id: "01", threshold: 31, title: "1.会議：【露出実験】" },
            { id: "02", threshold: 27, title: "2.昼食：【あーん】" },
            { id: "03", threshold: 24, title: "3.天道：【ジャンプ】" },
            { id: "04", threshold: 21, title: "4.買出：【大量捕獲】" },
            { id: "05", threshold: 16, title: "5.自然：【森の精霊】" },
            { id: "06", threshold: 10, title: "6.夕食：【シェフの魂】" },
            { id: "07", threshold: 7, title: "7.朝食：【無防備な朝】" },
            { id: "08", threshold: 3, title: "8.遊覧船：【限界耐風】" },
            { id: "09", threshold: 0, title: "9.空港：【名残惜しさ】" }
        ];

        let shotCount = parseInt(localStorage.getItem('retro_count')) || 0;
        let selectedCar = localStorage.getItem('retro_car') || null;
        let resetClickCount = 0;
        let isFlashOn = false, isCameraOn = false, isTimerActive = false, isAuthReady = false;
        let stream = null;

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const shutterBtn = document.getElementById('shutter');
        const guideTitle = document.getElementById('guide-title');
        const carSelect = document.getElementById('carSelect');
        const counterDisplay = document.getElementById('counter');
        const statusMsg = document.getElementById('status-msg');

        onAuthStateChanged(auth, (user) => { if (user) { isAuthReady = true; syncPhotos(); } else { signInAnonymously(auth); } });

        window.onload = () => {
            if (selectedCar) { carSelect.value = selectedCar; carSelect.disabled = true; }
            startCamera(); updateUI();
        };

        async function startCamera() {
            if (stream) stream.getTracks().forEach(t => t.stop());
            try {
                // 画質を落とすためあえてidealを少し低めに設定 (2K相当)
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 2560 }, height: { ideal: 1440 } } });
                video.srcObject = stream;
                isCameraOn = true; updateUI();
            } catch (e) { statusMsg.innerText = "CAMERA ERROR"; }
        }

        function updateUI() {
            const remaining = 34 - shotCount;
            counterDisplay.innerText = remaining > 0 ? remaining : 0;
            if (!selectedCar) {
                guideTitle.innerText = "チームを選択してください";
                shutterBtn.disabled = true;
            } else {
                const current = missionMap.find(m => remaining > m.threshold);
                guideTitle.innerText = current ? current.title : "ミッション完了！";
                shutterBtn.disabled = (remaining <= 0 || !isCameraOn);
            }
        }

        carSelect.onchange = () => {
            if (carSelect.value) {
                selectedCar = carSelect.value;
                localStorage.setItem('retro_car', selectedCar);
                carSelect.disabled = true;
                updateUI();
            }
        };

        shutterBtn.onclick = () => {
            if (isTimerActive) {
                let tl = 5; document.getElementById('timer-display').style.visibility = "visible";
                const c = setInterval(() => {
                    document.getElementById('timer-display').innerText = --tl;
                    if (tl <= 0) { clearInterval(c); document.getElementById('timer-display').style.visibility = "hidden"; takePicture(); }
                }, 1000);
            } else takePicture();
        };

        function takePicture() {
            shutterBtn.disabled = true;
            const vw = video.videoWidth; const vh = video.videoHeight;
            canvas.width = vw; canvas.height = vh;
            const ctx = canvas.getContext('2d');
            const z = parseFloat(document.getElementById('zoomRange').value);
            const sw = vw/z, sh = vh/z, sx = (vw-sw)/2, sy = (vh-sh)/2;
            
            ctx.drawImage(video, sx, sy, sw, sh, 0, 0, vw, vh);

            // エフェクト & 刻印
            applyEffects(ctx, vw, vh);
            addStamps(ctx, vw, vh);

            // 画質設定を0.85に落としてフィルム感を出す
            canvas.toBlob(async (blob) => {
                const now = new Date();
                const timeStr = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}-${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}${String(now.getSeconds()).padStart(2,'0')}`;
                const mID = (missionMap.find(m => (34-shotCount) > m.threshold) || {id:"99"}).id;
                const fileName = `team${selectedCar}_${mID}_${timeStr}.jpg`;

                const tx = db.transaction(storeName, "readwrite");
                tx.objectStore(storeName).add({ blob, fileName });
                
                shotCount++;
                localStorage.setItem('retro_count', shotCount);
                updateUI();
                syncPhotos();
                setTimeout(() => { if(34-shotCount > 0) shutterBtn.disabled = false; }, 3000);
            }, 'image/jpeg', 0.85);
        }

        async function syncPhotos() {
            if (!navigator.onLine || !db || !isAuthReady) return;
            const store = db.transaction(storeName, "readwrite").objectStore(storeName);
            const request = store.getAll();
            request.onsuccess = async () => {
                const items = request.result;
                if(items.length > 0) statusMsg.innerText = `SYNCING ${items.length}...`;
                for (const item of items) {
                    try {
                        await uploadBytes(ref(storage, `photos/${item.fileName}`), item.blob);
                        db.transaction(storeName, "readwrite").objectStore(storeName).delete(item.id);
                    } catch (e) { break; }
                }
                statusMsg.innerText = items.length === 0 ? "READY" : statusMsg.innerText;
            };
        }

        function applyEffects(ctx, w, h) {
            ctx.globalCompositeOperation = 'overlay';
            ctx.fillStyle = 'rgba(0, 255, 120, 0.1)'; ctx.fillRect(0, 0, w, h); // 少し強めのCinema Green
            ctx.fillStyle = isFlashOn ? 'rgba(255, 255, 255, 0.2)' : 'rgba(255, 180, 50, 0.15)'; ctx.fillRect(0, 0, w, h);
            ctx.globalCompositeOperation = 'source-over';
            
            // 粒子ノイズを少し大きく、濃くする
            const grain = (w * h) / 4;
            for (let i = 0; i < grain; i++) {
                const x = Math.random() * w; const y = Math.random() * h;
                const opacity = Math.random() * 0.12; 
                ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`; 
                ctx.fillRect(x, y, 1.5, 1.5);
            }
            
            const g = ctx.createRadialGradient(w/2, h/2, w/4, w/2, h/2, w/0.8);
            g.addColorStop(0, 'transparent'); g.addColorStop(1, 'rgba(0,0,0,0.65)');
            ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);
        }

        function addStamps(ctx, w, h) {
            const n = new Date();
            const d = `'${n.getFullYear().toString().slice(-2)}.${String(n.getMonth()+1).padStart(2,'0')}.${String(n.getDate()).padStart(2,'0')} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
            const t = `${selectedCar} TEAM`;
            const fs = Math.floor(w * 0.045);
            ctx.font = `bold ${fs}px "Courier New", monospace`;
            ctx.lineWidth = fs/6; ctx.strokeStyle = "rgba(0,0,0,0.8)";
            ctx.textAlign = "right"; ctx.strokeText(d, w*0.95, h*0.95); ctx.fillStyle = "#ff7b00"; ctx.fillText(d, w*0.95, h*0.95);
            ctx.textAlign = "left"; ctx.strokeText(t, w*0.05, h*0.95); ctx.fillText(t, w*0.05, h*0.95);
        }

        // リセット機能（連打対応）
        document.getElementById('resetTrigger').onclick = () => {
            resetClickCount++;
            if (resetClickCount >= 5) {
                if(confirm("リセット（枚数・チーム解除）しますか？")) {
                    shotCount = 0; selectedCar = null;
                    localStorage.setItem('retro_count', 0); localStorage.removeItem('retro_car');
                    carSelect.disabled = false; carSelect.value = "";
                    updateUI();
                }
                resetClickCount = 0;
            }
            setTimeout(() => { resetClickCount = 0; }, 2000);
        };

        // その他ボタン
        document.getElementById('flashBtn').onclick = () => { isFlashOn = !isFlashOn; flashBtn.innerText = isFlashOn ? "FLASH ON" : "FLASH OFF"; flashBtn.classList.toggle('flash-on', isFlashOn); };
        document.getElementById('timerBtn').onclick = () => { isTimerActive = !isTimerActive; timerBtn.classList.toggle('flash-on', isTimerActive); };
        document.getElementById('switchBtn').onclick = () => { /* カメラ切替ロジック */ };
        document.getElementById('zoomRange').oninput = (e) => video.style.setProperty('--zoom-level', e.target.value);
        window.addEventListener('online', syncPhotos);
    </script>
</body>
</html>
