<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Cam v2</title>
    <style>
        :root {
            --body-bg: #1a1a1a;
            --panel-bg: #333;
            --accent: #ffae00;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--body-bg);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100dvh;
            overflow: hidden;
        }

        /* 小さなファインダー（表示サイズは固定） */
        .viewfinder-container {
            width: 150px;
            height: 150px;
            border: 3px solid #555;
            border-radius: 4px;
            overflow: hidden;
            background: #000;
            position: relative;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* ズーム倍率をプレビューにも反映 */
            transform: scale(var(--zoom-level, 1));
            transform-origin: center;
        }

        .controls {
            margin-top: 20px;
            text-align: center;
            width: 100%;
        }

        /* 撮影枚数表示 (現在の枚数 / 最大枚数) */
        .counter {
            font-size: 1.5rem;
            color: var(--accent);
            margin-bottom: 10px;
        }

        /* ズームスライダー */
        .zoom-control {
            margin: 15px 0;
            width: 200px;
        }

        input[type=range] {
            width: 100%;
            accent-color: var(--accent);
        }

        button {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 4px solid #222;
            background: #d00; /* 写ルンですのシャッター風 */
            box-shadow: 0 4px 0 #600;
            cursor: pointer;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: none;
        }

        button:disabled {
            background: #444;
            box-shadow: none;
        }

        #preview-container {
            margin-top: 20px;
            max-width: 200px;
        }

        img {
            width: 100%;
            border: 2px solid #fff;
        }

        canvas { display: none; }
    </style>
</head>
<body>

    <div class="viewfinder-container">
        <video id="video" autoplay playsinline></video>
    </div>

    <div class="controls">
        <div class="counter" id="counter">0 / 30</div>
        
        <div class="zoom-control">
            <label style="font-size: 12px;">ZOOM</label><br>
            <input type="range" id="zoomRange" min="1" max="3" step="0.1" value="1">
        </div>

        <button id="shutter"></button>
    </div>

    <div id="preview-container"></div>
    <canvas id="canvas"></canvas>

    <script>
        // --- 1. Google API 設定値 ---
    const CLIENT_ID = '341523960931-58ltfdmmi1l6m2ksjf5s4kga5mlu9sct.apps.googleusercontent.com';
    const SCOPE = 'https://www.googleapis.com/auth/photoslibrary.appendonly';
    let accessToken = null;

    // --- 2. ページ読み込み時の処理 (トークン回収) ---
    window.addEventListener('load', () => {
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        accessToken = params.get('access_token');
        if (accessToken) {
            // URLを綺麗にする
            history.replaceState(null, null, window.location.pathname);
            alert("Googleフォト連携中！");
        }
        initCamera(); // カメラ起動
    });

    // --- 3. Googleログイン関数 ---
    function loginToGoogle() {
        const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(window.location.href)}&response_type=token&scope=${encodeURIComponent(SCOPE)}`;
        window.location.href = authUrl;
    }

    // --- 4. アップロード関数 (非同期) ---
    async function uploadToGoogle(blob) {
        if (!accessToken) return;
        try {
            // A. アップロードトークンの取得
            const res1 = await fetch('https://photoslibrary.googleapis.com/v1/uploads', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${accessToken}`,
                    'Content-type': 'application/octet-stream',
                    'X-Goog-Upload-Protocol': 'raw'
                },
                body: blob
            });
            const uploadToken = await res1.text();

            // B. ライブラリへの登録
            await fetch('https://photoslibrary.googleapis.com/v1/mediaItems:batchCreate', {
                method: 'POST',
                headers: {
                    'Content-type': 'application/json',
                    'Authorization': `Bearer ${accessToken}`
                },
                body: JSON.stringify({
                    "newMediaItems": [{
                        "description": "Retro Cam Photo",
                        "simpleMediaItem": { "uploadToken": uploadToken }
                    }]
                })
            });
            console.log("Google Photos Upload Success!");
        } catch (e) { console.error(e); }
    }
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const shutterBtn = document.getElementById('shutter');
        const counterDisplay = document.getElementById('counter');
        const zoomRange = document.getElementById('zoomRange');
        const previewContainer = document.getElementById('preview-container');

        const MAX_SHOTS = 30;
        // localStorageから「撮影済み枚数」を取得。なければ0
        let shotCount = localStorage.getItem('retro_shot_count') 
            ? parseInt(localStorage.getItem('retro_shot_count')) 
            : 0;

        let videoTrack = null;

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: "environment",
                        width: { ideal: 4096 }, // 可能な限り高解像度を要求
                        height: { ideal: 2160 }
                    },
                    audio: false
                });
                video.srcObject = stream;
                videoTrack = stream.getVideoTracks()[0];
                
                // ブラウザがネイティブズームに対応しているか確認
                const capabilities = videoTrack.getCapabilities();
                if (capabilities.zoom) {
                    zoomRange.min = capabilities.zoom.min;
                    zoomRange.max = capabilities.zoom.max;
                    zoomRange.step = capabilities.zoom.step;
                }
            } catch (err) {
                alert("カメラの起動に失敗しました。");
            }
            updateUI();
        }

        // ズーム変更時の処理
        zoomRange.addEventListener('input', (e) => {
            const zoomVal = e.target.value;
            // プレビューの見た目を変える
            video.style.setProperty('--zoom-level', zoomVal);
            
            // ネイティブズームが使える場合は適用
            if (videoTrack && videoTrack.applyConstraints) {
                videoTrack.applyConstraints({ advanced: [{ zoom: zoomVal }] });
            }
        });

        function updateUI() {
            // 「撮影済み / 最大枚数」形式で表示
            counterDisplay.innerText = `${shotCount} / ${MAX_SHOTS}`;
            if (shotCount >= MAX_SHOTS) {
                shutterBtn.disabled = true;
                counterDisplay.style.color = "red";
            }
        }

        shutterBtn.addEventListener('click', () => {
            if (shotCount >= MAX_SHOTS) return;

            const ctx = canvas.getContext('2d');
            
            // 【重要】解像度をスマホ本体（ビデオストリーム）の生サイズに合わせる
            const rawW = video.videoWidth;
            const rawH = video.videoHeight;
            canvas.width = rawW;
            canvas.height = rawH;

            // デジタルズームの計算（ネイティブズームが効かないブラウザ用）
            const z = zoomRange.value;
            const sw = rawW / z;
            const sh = rawH / z;
            const sx = (rawW - sw) / 2;
            const sy = (rawH - sh) / 2;

            // キャプチャ（ズーム位置を切り出し）
            ctx.drawImage(video, sx, sy, sw, sh, 0, 0, rawW, rawH);

            // 加工と日付
            applyEffects(ctx, rawW, rawH);
            addTimestamp(ctx, rawW, rawH);

            const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
            displayPreview(dataUrl);

            shotCount++;
            localStorage.setItem('retro_shot_count', shotCount);
            updateUI();
        });

        function applyEffects(ctx, w, h) {
            // 粒子ノイズ（解像度に合わせて密度を調整）
            ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
            for (let i = 0; i < (w * h) / 1000; i++) {
                ctx.fillRect(Math.random() * w, Math.random() * h, 1, 1);
            }
            // セピア調
            ctx.globalCompositeOperation = 'multiply';
            ctx.fillStyle = 'rgba(255, 200, 150, 0.2)';
            ctx.fillRect(0, 0, w, h);
            ctx.globalCompositeOperation = 'source-over';
        }

        function addTimestamp(ctx, w, h) {
            const now = new Date();
            const dateStr = `${now.getFullYear().toString().slice(-2)}.${(now.getMonth()+1).toString().padStart(2,'0')}.${now.getDate().toString().padStart(2,'0')}`;
            
            // 解像度に応じてフォントサイズを動的に変更
            const fontSize = Math.floor(w * 0.05);
            ctx.font = `italic bold ${fontSize}px sans-serif`;
            ctx.fillStyle = '#ff8c00';
            ctx.textAlign = 'right';
            ctx.fillText(dateStr, w * 0.95, h * 0.95);
        }

        function displayPreview(url) {
            previewContainer.innerHTML = `<img src="${url}"><br><a href="${url}" download="photo.jpg" style="color:white; font-size:10px;">SAVE PHOTO</a>`;
        }

        initCamera();
    </script>
</body>
</html>
