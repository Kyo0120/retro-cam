<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Cam - Fast Start</title>
    <style>
        :root { --body-bg: #1a1a1a; --accent: #ffae00; }
        body { 
            margin: 0; padding: 0; background-color: var(--body-bg); color: white; 
            font-family: 'Courier New', Courier, monospace; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; 
            height: 100dvh; overflow: hidden; 
        }
        .viewfinder-container { 
            width: 120px; height: 80px; border: 4px solid #333; border-radius: 2px; 
            overflow: hidden; background: #000; position: relative; box-shadow: inset 0 0 10px #000;
        }
        video { width: 100%; height: 100%; object-fit: cover; transform: scale(var(--zoom-level, 1)); transform-origin: center; }
        video.selfie { transform: scale(var(--zoom-level, 1)) scaleX(-1); }
        #timer-display { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 1.5rem; color: var(--accent); font-weight: bold; visibility: hidden; z-index: 10; }
        .controls { margin-top: 15px; text-align: center; width: 100%; }
        .counter { font-size: 1.8rem; color: var(--accent); font-weight: bold; }
        .counter-label { font-size: 10px; color: #888; margin-bottom: 5px; }
        .tool-box { margin-bottom: 25px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
        input[type=range] { width: 150px; accent-color: var(--accent); }
        .btn-group { display: flex; gap: 10px; margin-top: 5px; }
        .sub-btn { background: #444; color: #eee; border: 1px solid #666; padding: 6px 12px; border-radius: 4px; font-size: 10px; cursor: pointer; }
        .flash-on { background: var(--accent) !important; color: #000 !important; font-weight: bold; }
        .shutter-area { display: flex; align-items: center; justify-content: center; gap: 20px; margin-top: 10px; }
        #shutter { width: 70px; height: 70px; border-radius: 50%; border: 4px solid #222; background: #d00; box-shadow: 0 4px 0 #600; cursor: pointer; }
        #shutter:disabled { background: #444; box-shadow: none; filter: grayscale(100%); opacity: 0.5; }
        .timer-btn { background: #555; color: white; border: 2px solid #777; padding: 10px; border-radius: 8px; font-size: 10px; cursor: pointer; }
        #status-msg { font-size: 10px; color: #aaa; margin-top: 15px; height: 12px; }
        canvas { display: none; }
    </style>
</head>
<body>

    <div class="viewfinder-container">
        <video id="video" autoplay playsinline></video>
        <div id="timer-display">5</div>
    </div>

    <div class="controls">
        <div class="counter" id="counter">30</div>
        <div class="counter-label">REMAINING</div>
        
        <div class="tool-box">
            <div>
                <label style="font-size:10px; color:#888;">ZOOM</label><br>
                <input type="range" id="zoomRange" min="1" max="3" step="0.1" value="1">
            </div>
            <div class="btn-group">
                <button class="sub-btn" id="switchBtn">カメラ切り替え</button>
                <button class="sub-btn" id="flashBtn">FLASH OFF</button>
            </div>
        </div>

        <div class="shutter-area">
            <button class="timer-btn" id="timerBtn">5s TIMER</button>
            <button id="shutter"></button>
            <div style="width: 50px;"></div>
        </div>
        
        <div id="status-msg">WAITING FOR START...</div>
    </div>

    <canvas id="canvas"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getStorage, ref, uploadBytes } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // --- Firebase Config（ここを差し替えてください） ---
        const firebaseConfig = {
            apiKey: "AIzaSyDHqQDeEMrFV09YI0n_ARr1Tzta5aqmE2U",
            authDomain: "my-retro-cam.firebaseapp.com",
            projectId: "my-retro-cam",
            storageBucket: "my-retro-cam.firebasestorage.app",
            messagingSenderId: "700098109654",
            appId: "1:700098109654:web:9d679cbd092c1376642977"
        };

        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);
        const auth = getAuth(app);

        const MAX_SHOTS = 30;
        const CHARGE_TIME = 5000;
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const shutterBtn = document.getElementById('shutter');
        const timerBtn = document.getElementById('timerBtn');
        const flashBtn = document.getElementById('flashBtn');
        const switchBtn = document.getElementById('switchBtn');
        const counterDisplay = document.getElementById('counter');
        const statusMsg = document.getElementById('status-msg');
        const timerDisplay = document.getElementById('timer-display');

        let shotCount = localStorage.getItem('retro_used_count') ? parseInt(localStorage.getItem('retro_used_count')) : 0;
        let currentFacingMode = "environment";
        let isFlashOn = false;
        let currentStream = null;
        let db;

        // --- IndexedDB ---
        const dbRequest = indexedDB.open("RetroCamDB", 1);
        dbRequest.onsuccess = (e) => { db = e.target.result; syncOfflineData(); };
        dbRequest.onupgradeneeded = (e) => {
            db = e.target.result;
            if (!db.objectStoreNames.contains("pendingUploads")) db.createObjectStore("pendingUploads", { keyPath: "id", autoIncrement: true });
        };

        // --- 起動シーケンス ---
        window.onload = () => {
            // 1. カメラを即座に起動（最優先）
            initCamera("environment");
            
            // 2. 認証をバックグラウンドで開始
            statusMsg.innerText = "AUTHENTICATING...";
            signInAnonymously(auth).then(() => {
                statusMsg.innerText = "AUTH OK";
                checkOnlineStatus();
                syncOfflineData();
            }).catch(err => {
                console.error("Auth Error:", err);
                statusMsg.innerText = "AUTH ERROR - LOCAL ONLY";
            });

            updateUI();
        };

        async function initCamera(facingMode) {
            statusMsg.innerText = "CAMERA STARTING...";
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
                await new Promise(r => setTimeout(r, 800));
            }
            try {
                // iPhoneの限界を考慮し、1920x1080をターゲットにする
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: facingMode, width: { ideal: 1920 }, height: { ideal: 1080 } },
                    audio: false
                });
                currentStream = stream;
                video.srcObject = stream;
                video.classList.toggle('selfie', facingMode === "user");
                if (isFlashOn && facingMode === "environment") toggleTorch(true);
                statusMsg.innerText = "READY";
            } catch (err) {
                console.warn("Retrying camera...", err);
                try {
                    const fallback = await navigator.mediaDevices.getUserMedia({ video: true });
                    currentStream = fallback;
                    video.srcObject = fallback;
                    statusMsg.innerText = "READY (LOW-RES)";
                } catch (e) {
                    statusMsg.innerText = "CAMERA ERROR";
                }
            }
        }

        function takePicture() {
            if (shotCount >= MAX_SHOTS) return;
            shutterBtn.disabled = true;
            timerBtn.disabled = true;
            setTimeout(() => { if (MAX_SHOTS - shotCount > 0) { shutterBtn.disabled = false; timerBtn.disabled = false; } }, CHARGE_TIME);

            const ctx = canvas.getContext('2d');
            const vW = video.videoWidth;
            const vH = video.videoHeight;
            let tw, th;
            if (vW / vH > 1.5) { th = vH; tw = vH * 1.5; } else { tw = vW; th = vW / 1.5; }
            canvas.width = tw; canvas.height = th;

            const z = parseFloat(document.getElementById('zoomRange').value);
            const sw = tw / z; const sh = th / z;
            const sx = (vW - sw) / 2; const sy = (vH - sh) / 2;

            ctx.drawImage(video, sx, sy, sw, sh, 0, 0, tw, th);
            if (currentFacingMode === "user") {
                const t = document.createElement('canvas'); t.width = tw; t.height = th;
                const tc = t.getContext('2d'); tc.translate(tw, 0); tc.scale(-1, 1);
                tc.drawImage(canvas, 0, 0); ctx.clearRect(0, 0, tw, th); ctx.drawImage(t, 0, 0);
            }
            applyRetroEffects(ctx, tw, th, isFlashOn);
            addTimestamp(ctx, tw, th);

            canvas.toBlob((blob) => {
                const transaction = db.transaction(["pendingUploads"], "readwrite");
                transaction.objectStore("pendingUploads").add({ blob: blob, timestamp: Date.now() });
                syncOfflineData();
            }, 'image/jpeg', 1.0);

            shotCount++;
            localStorage.setItem('retro_used_count', shotCount);
            updateUI();
        }

        async function syncOfflineData() {
            if (!navigator.onLine || !db || !auth.currentUser) return;
            const store = db.transaction(["pendingUploads"], "readwrite").objectStore("pendingUploads");
            const request = store.getAll();
            request.onsuccess = async () => {
                const items = request.result;
                if (items.length === 0) { statusMsg.innerText = "READY"; return; }
                statusMsg.innerText = `SYNCING ${items.length}...`;
                for (const item of items) {
                    try {
                        const fileRef = ref(storage, `photos/${Date.now()}.jpg`);
                        await uploadBytes(fileRef, item.blob);
                        db.transaction(["pendingUploads"], "readwrite").objectStore("pendingUploads").delete(item.id);
                    } catch (e) { break; }
                }
                syncOfflineData();
            };
        }

        async function toggleTorch(on) {
            if (!currentStream || currentFacingMode === "user") return;
            const track = currentStream.getVideoTracks()[0];
            const caps = track.getCapabilities();
            if (caps.torch) await track.applyConstraints({ advanced: [{ torch: on }] });
        }

        function applyRetroEffects(ctx, w, h, flash) {
            ctx.globalCompositeOperation = 'overlay';
            ctx.fillStyle = flash ? 'rgba(255, 255, 255, 0.2)' : 'rgba(255, 160, 50, 0.1)';
            ctx.fillRect(0, 0, w, h);
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.03)';
            for (let i = 0; i < (w * h) / 1500; i++) ctx.fillRect(Math.random() * w, Math.random() * h, 1, 1);
            const grad = ctx.createRadialGradient(w/2, h/2, w/3, w/2, h/2, w/0.9);
            grad.addColorStop(0, 'transparent'); grad.addColorStop(1, 'rgba(0,0,0,0.4)');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, w, h);
        }

        function addTimestamp(ctx, w, h) {
            const now = new Date();
            const timeStr = `${now.getFullYear().toString().slice(-2)}.${(now.getMonth()+1).toString().padStart(2, '0')}.${now.getDate().toString().padStart(2, '0')}  ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
            ctx.font = `bold ${Math.floor(w * 0.045)}px "Courier New", monospace`;
            ctx.textAlign = 'right'; ctx.fillStyle = '#ff7b00';
            ctx.shadowColor = 'rgba(255, 100, 0, 0.5)'; ctx.shadowBlur = 5;
            ctx.fillText(timeStr, w * 0.95, h * 0.95);
        }

        function updateUI() {
            const rem = MAX_SHOTS - shotCount;
            counterDisplay.innerText = rem > 0 ? rem : 0;
            if (rem <= 0) { shutterBtn.disabled = true; timerBtn.disabled = true; counterDisplay.style.color = "red"; }
        }

        function checkOnlineStatus() {
            window.addEventListener('online', syncOfflineData);
            window.addEventListener('offline', () => { statusMsg.innerText = "OFFLINE - QUEUED"; });
        }

        shutterBtn.addEventListener('click', takePicture);
        switchBtn.addEventListener('click', () => { currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment"; initCamera(currentFacingMode); });
        flashBtn.addEventListener('click', async () => {
            isFlashOn = !isFlashOn;
            flashBtn.innerText = isFlashOn ? "FLASH ON" : "FLASH OFF";
            flashBtn.classList.toggle('flash-on', isFlashOn);
            toggleTorch(isFlashOn);
        });
        timerBtn.addEventListener('click', () => {
            let timeLeft = 5; timerBtn.disabled = true; shutterBtn.disabled = true;
            timerDisplay.innerText = timeLeft; timerDisplay.style.visibility = "visible";
            const cd = setInterval(() => { timeLeft--; timerDisplay.innerText = timeLeft; if (timeLeft <= 0) { clearInterval(cd); timerDisplay.style.visibility = "hidden"; takePicture(); } }, 1000);
        });
        document.getElementById('zoomRange').addEventListener('input', (e) => video.style.setProperty('--zoom-level', e.target.value));
    </script>
</body>
</html>
