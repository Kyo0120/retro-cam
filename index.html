<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Cam - Pro</title>
    <style>
        :root { --body-bg: #1a1a1a; --accent: #ffae00; }
        body { 
            margin: 0; padding: 0; background-color: var(--body-bg); color: white; 
            font-family: 'Courier New', Courier, monospace; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; 
            height: 100dvh; overflow: hidden; 
        }
        
        .viewfinder-container { 
            width: 240px; height: 160px; border: 3px solid #555; border-radius: 4px; 
            overflow: hidden; background: #000; position: relative;
        }
        video { 
            width: 100%; height: 100%; object-fit: cover; 
            transform: scale(var(--zoom-level, 1)); transform-origin: center;
        }

        .controls { margin-top: 10px; text-align: center; width: 100%; }
        .counter { font-size: 1.8rem; color: var(--accent); font-weight: bold; }
        .counter-label { font-size: 10px; color: #888; margin-bottom: 5px; }

        #auth-btn { 
            background-color: #4285f4; color: white; border: none; 
            padding: 6px 12px; border-radius: 20px; font-size: 10px; 
            margin-bottom: 10px; cursor: pointer; 
        }
        
        .tool-box { margin-bottom: 25px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        input[type=range] { width: 180px; accent-color: var(--accent); }
        
        .switch-btn {
            background: #444; color: #eee; border: 1px solid #666;
            padding: 5px 15px; border-radius: 4px; font-size: 10px; cursor: pointer;
        }

        #shutter { 
            width: 80px; height: 80px; border-radius: 50%; border: 5px solid #222; 
            background: #d00; box-shadow: 0 4px 0 #600; cursor: pointer; 
        }
        #shutter:disabled { background: #444; box-shadow: none; filter: grayscale(100%); opacity: 0.5; }

        #loading-msg { font-size: 10px; color: var(--accent); visibility: hidden; margin-top: 10px; height: 12px; }
        canvas { display: none; }
    </style>
</head>
<body>

    <div class="viewfinder-container">
        <video id="video" autoplay playsinline></video>
    </div>

    <div class="controls">
        <div class="counter" id="counter">30</div>
        <div class="counter-label">REMAINING</div>
        
        <button id="auth-btn">Googleフォトと連携</button>
        
        <div class="tool-box">
            <div>
                <label style="font-size:10px; color:#888;">ZOOM</label><br>
                <input type="range" id="zoomRange" min="1" max="3" step="0.1" value="1">
            </div>
            <button class="switch-btn" id="switchBtn">CAMERA SWITCH</button>
        </div>

        <button id="shutter"></button>
        <div id="loading-msg">HIGH-RES SYNCING...</div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const CLIENT_ID = '341523960931-58ltfdmmi1l6m2ksjf5s4kga5mlu9sct.apps.googleusercontent.com'; 
        const SCOPE = 'https://www.googleapis.com/auth/photoslibrary.appendonly';
        const MAX_SHOTS = 30;
        const CHARGE_TIME = 5000;

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const shutterBtn = document.getElementById('shutter');
        const authBtn = document.getElementById('auth-btn');
        const switchBtn = document.getElementById('switchBtn');
        const counterDisplay = document.getElementById('counter');
        const zoomRange = document.getElementById('zoomRange');
        const loadingMsg = document.getElementById('loading-msg');

        let accessToken = null;
        let shotCount = localStorage.getItem('retro_used_count') ? parseInt(localStorage.getItem('retro_used_count')) : 0;
        let currentFacingMode = "environment"; // 初期値は外カメラ

        window.onload = async () => {
            await initCamera(currentFacingMode);
            checkAuth();
            updateUI();
        };

        async function initCamera(facingMode) {
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: facingMode, width: { ideal: 4096 }, height: { ideal: 2160 } },
                    audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                alert("カメラを起動できません");
            }
        }

        switchBtn.addEventListener('click', async () => {
            currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
            await initCamera(currentFacingMode);
        });

        function checkAuth() {
            const params = new URLSearchParams(window.location.hash.substring(1));
            accessToken = params.get('access_token');
            if (accessToken) {
                history.replaceState(null, null, window.location.pathname);
                authBtn.innerText = "✓ 連携済み";
                authBtn.style.backgroundColor = "#34a853";
            }
        }

        authBtn.addEventListener('click', () => {
            const redirectUri = window.location.origin + window.location.pathname;
            const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=${encodeURIComponent(SCOPE)}`;
            window.location.href = authUrl;
        });

        zoomRange.addEventListener('input', (e) => {
            video.style.setProperty('--zoom-level', e.target.value);
        });

        shutterBtn.addEventListener('click', () => {
            if (shotCount >= MAX_SHOTS) return;

            shutterBtn.disabled = true;
            setTimeout(() => {
                if ((MAX_SHOTS - shotCount) > 0) shutterBtn.disabled = false;
            }, CHARGE_TIME);

            const ctx = canvas.getContext('2d');
            const vW = video.videoWidth;
            const vH = video.videoHeight;

            let targetW, targetH;
            if (vW / vH > 3/2) {
                targetH = vH; targetW = vH * (3/2);
            } else {
                targetW = vW; targetH = vW / (3/2);
            }

            canvas.width = targetW;
            canvas.height = targetH;

            const z = parseFloat(zoomRange.value);
            const sw = targetW / z;
            const sh = targetH / z;
            const sx = (vW - sw) / 2;
            const sy = (vH - sh) / 2;

            ctx.drawImage(video, sx, sy, sw, sh, 0, 0, targetW, targetH);

            // インカメラの場合は左右反転させる（鏡合わせ対策）
            if (currentFacingMode === "user") {
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = targetW; tempCanvas.height = targetH;
                const tempCtx = tempCanvas.getContext('2d');
                tempCtx.translate(targetW, 0);
                tempCtx.scale(-1, 1);
                tempCtx.drawImage(canvas, 0, 0);
                ctx.clearRect(0, 0, targetW, targetH);
                ctx.drawImage(tempCanvas, 0, 0);
            }

            applyRetroEffects(ctx, targetW, targetH);
            addTimestamp(ctx, targetW, targetH);

            canvas.toBlob(async (blob) => {
                if (accessToken) {
                    loadingMsg.style.visibility = "visible";
                    await uploadToGoogle(blob);
                    loadingMsg.style.visibility = "hidden";
                }
            }, 'image/jpeg', 1.0); // 画質を1.0(最高)に保持

            shotCount++;
            localStorage.setItem('retro_used_count', shotCount);
            updateUI();
        });

        function applyRetroEffects(ctx, w, h) {
            // 焼き付け（オーバーレイで色味のみ変更）
            ctx.globalCompositeOperation = 'overlay';
            ctx.fillStyle = 'rgba(255, 160, 50, 0.1)';
            ctx.fillRect(0, 0, w, h);

            // 粒子感（高解像度に合わせて密度調整）
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.03)';
            for (let i = 0; i < (w * h) / 2000; i++) {
                ctx.fillRect(Math.random() * w, Math.random() * h, 1, 1);
            }

            // ヴィネット
            const grad = ctx.createRadialGradient(w/2, h/2, w/3, w/2, h/2, w/0.9);
            grad.addColorStop(0, 'transparent');
            grad.addColorStop(1, 'rgba(0,0,0,0.3)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);
        }

        function addTimestamp(ctx, w, h) {
            const now = new Date();
            const timeStr = `${now.getFullYear().toString().slice(-2)}.${(now.getMonth()+1).toString().padStart(2, '0')}.${now.getDate().toString().padStart(2, '0')}  ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
            const fontSize = Math.floor(w * 0.04);
            ctx.font = `bold ${fontSize}px "Courier New", monospace`;
            ctx.textAlign = 'right';
            ctx.fillStyle = '#ff7b00';
            ctx.shadowColor = 'rgba(255, 100, 0, 0.5)';
            ctx.shadowBlur = 5;
            ctx.fillText(timeStr, w * 0.95, h * 0.95);
        }

        async function uploadToGoogle(blob) {
            try {
                const res = await fetch('https://photoslibrary.googleapis.com/v1/uploads', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-type': 'application/octet-stream', 'X-Goog-Upload-Protocol': 'raw' },
                    body: blob
                });
                const token = await res.text();
                await fetch('https://photoslibrary.googleapis.com/v1/mediaItems:batchCreate', {
                    method: 'POST',
                    headers: { 'Content-type': 'application/json', 'Authorization': `Bearer ${accessToken}` },
                    body: JSON.stringify({ "newMediaItems": [{ "simpleMediaItem": { "uploadToken": token } }] })
                });
            } catch (e) { console.error(e); }
        }

        function updateUI() {
            const remaining = MAX_SHOTS - shotCount;
            counterDisplay.innerText = remaining > 0 ? remaining : 0;
            if (remaining <= 0) {
                shutterBtn.disabled = true;
                counterDisplay.style.color = "red";
            }
        }
    </script>
</body>
</html>
