<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Cam Prototype</title>
    <style>
        :root {
            --body-bg: #222;
            --panel-bg: #444;
            --accent: #ffae00;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--body-bg);
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100dvh;
            overflow: hidden;
        }

        /* 150x150の小さなファインダー */
        .viewfinder-container {
            margin-top: 40px;
            width: 150px;
            height: 150px;
            border: 4px solid var(--panel-bg);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(1px); /* あえて少しぼかして確認しづらくする */
        }

        /* UIパネル */
        .controls {
            margin-top: 30px;
            text-align: center;
        }

        .counter {
            font-family: 'Courier New', Courier, monospace;
            font-size: 2rem;
            color: var(--accent);
            background: #000;
            padding: 5px 15px;
            border-radius: 5px;
            border: 2px solid #555;
            margin-bottom: 20px;
        }

        button {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            background: radial-gradient(#666, #333);
            box-shadow: 0 4px 0 #000;
            cursor: pointer;
            active: transform: translateY(2px);
        }

        button:disabled {
            background: #222;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* 撮影結果のプレビュー表示 */
        #preview-container {
            margin-top: 20px;
            width: 80%;
            max-width: 300px;
        }

        canvas {
            display: none; /* 加工用なので非表示 */
        }

        img {
            width: 100%;
            border: 5px solid #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .status-text {
            font-size: 0.8rem;
            color: #888;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="viewfinder-container">
        <video id="video" autoplay playsinline></video>
    </div>

    <div class="controls">
        <div class="counter" id="counter">30</div>
        <button id="shutter"></button>
        <div class="status-text">REMAINING</div>
    </div>

    <div id="preview-container">
        </div>

    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const shutterBtn = document.getElementById('shutter');
        const counterDisplay = document.getElementById('counter');
        const previewContainer = document.getElementById('preview-container');

        const MAX_SHOTS = 30;
        let remainingShots = localStorage.getItem('retro_cam_shots') 
            ? parseInt(localStorage.getItem('retro_cam_shots')) 
            : MAX_SHOTS;

        // 初期化：カメラ起動
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" }, // 外カメラ優先
                    audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                console.error("Camera Error:", err);
                alert("カメラの起動に失敗しました。HTTPS環境またはローカルホストで試してください。");
            }
            updateUI();
        }

        // UI更新
        function updateUI() {
            counterDisplay.innerText = remainingShots.toString().padStart(2, '0');
            if (remainingShots <= 0) {
                shutterBtn.disabled = true;
                counterDisplay.style.color = "#ff0000";
            }
        }

        // シャッター処理
        shutterBtn.addEventListener('click', () => {
            if (remainingShots <= 0) return;

            const ctx = canvas.getContext('2d');
            canvas.width = 1200; // 高画質保存用に大きめに設定
            canvas.height = 1200;

            // 1. キャプチャ
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // 2. フィルム風加工
            applyFilmEffect(ctx, canvas.width, canvas.height);

            // 3. 日付合成
            addTimestamp(ctx, canvas.width, canvas.height);

            // 4. 結果表示
            const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
            displayPreview(dataUrl);

            // 5. 枚数減算
            remainingShots--;
            localStorage.setItem('retro_cam_shots', remainingShots);
            updateUI();
        });

        function applyFilmEffect(ctx, w, h) {
            // セピア調とコントラストの適用
            ctx.globalCompositeOperation = 'overlay';
            ctx.fillStyle = 'rgba(112, 66, 20, 0.3)'; // セピア
            ctx.fillRect(0, 0, w, h);

            // 粒子ノイズの追加
            ctx.globalCompositeOperation = 'source-over';
            for (let i = 0; i < 5000; i++) {
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.random() * 0.05})`;
                ctx.beginPath();
                ctx.arc(Math.random() * w, Math.random() * h, Math.random() * 2, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // 周辺光量落ち（ヴィネット）
            const gradient = ctx.createRadialGradient(w/2, h/2, w/4, w/2, h/2, w/1.2);
            gradient.addColorStop(0, 'rgba(0,0,0,0)');
            gradient.addColorStop(1, 'rgba(0,0,0,0.5)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, w, h);
        }

        function addTimestamp(ctx, w, h) {
            const now = new Date();
            const dateStr = `${now.getFullYear().toString().slice(-2)}.${(now.getMonth()+1).toString().padStart(2,'0')}.${now.getDate().toString().padStart(2,'0')}`;
            
            ctx.font = 'italic bold 60px "Courier New", monospace';
            ctx.fillStyle = '#ff8c00'; // オレンジ色
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 5;
            ctx.textAlign = 'right';
            ctx.fillText(dateStr, w - 50, h - 50);
        }

        function displayPreview(url) {
            previewContainer.innerHTML = `
                <p style="text-align:center; font-size:12px;">Last Photo (Saved to history)</p>
                <img src="${url}" alt="Captured">
                <a href="${url}" download="retro_photo.jpg" style="color:white; display:block; text-align:center; margin-top:10px;">画像を保存する</a>
            `;
        }

        initCamera();
    </script>
</body>
</html>
