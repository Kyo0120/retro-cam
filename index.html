<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Retro Cam - Shiretoko Mission Final</title>
    <style>
        :root { --body-bg: #1a1a1a; --accent: #ffae00; --panel-bg: #252525; --overlay-bg: rgba(0,0,0,0.95); }
        body { margin: 0; padding: 0; background-color: var(--body-bg); color: white; font-family: 'Courier New', Courier, monospace; display: flex; height: 100dvh; width: 100dvw; overflow: hidden; flex-direction: row; align-items: stretch; }

        /* 左：プレビュー */
        .left-section { flex: 1.2; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: var(--body-bg); padding-left: env(safe-area-inset-left); position: relative; }
        .viewfinder-container { width: 140px; height: 93px; border: 4px solid #444; border-radius: 4px; overflow: hidden; background: #000; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scale(var(--zoom-level, 1)); transform-origin: center; }
        video.selfie { transform: scale(var(--zoom-level, 1)) scaleX(-1); }
        #timer-display { margin-top: 10px; font-size: 2rem; color: var(--accent); font-weight: bold; visibility: hidden; height: 2rem; }

        /* 中：設定（ボタン間隔を拡大） */
        .mid-section { width: 190px; background-color: var(--panel-bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; border-left: 1px solid #111; border-right: 1px solid #111; }
        .tool-group { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 15px; } /* gapを大きく設定 */
        input[type=range] { width: 120px; accent-color: var(--accent); }
        .sub-btn { background: #444; color: #eee; border: 1px solid #666; padding: 10px; border-radius: 6px; font-size: 10px; cursor: pointer; width: 85%; text-align: center; }
        .flash-on { background: var(--accent) !important; color: #000 !important; font-weight: bold; }
        
        .car-select { background: #000; color: var(--accent); border: 1px solid var(--accent); padding: 8px; border-radius: 4px; font-size: 12px; width: 85%; margin-bottom: 5px; text-align: center; }
        .car-select:disabled { opacity: 0.5; border-color: #444; color: #888; }

        /* 右：撮影（中央寄せに修正） */
        .right-section { width: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-right: env(safe-area-inset-right); background-color: var(--panel-bg); }
        .counter-group { text-align: center; cursor: pointer; -webkit-tap-highlight-color: transparent; margin-bottom: 30px; }
        .counter { font-size: 2.2rem; color: var(--accent); font-weight: bold; line-height: 1; }
        .counter-label { font-size: 10px; color: #888; margin-top: 5px; }
        
        .shutter-box { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 25px; width: 100%; } /* 中央寄せの要 */
        #shutter { width: 85px; height: 85px; border-radius: 50%; border: 6px solid #222; background: #d00; box-shadow: 0 6px 0 #600; cursor: pointer; }
        #shutter:active { transform: translateY(3px); box-shadow: 0 3px 0 #600; }
        #shutter:disabled { background: #444; box-shadow: none; opacity: 0.5; }
        .timer-btn { background: #555; color: white; border: 2px solid #777; padding: 12px; border-radius: 8px; font-size: 11px; cursor: pointer; width: 130px; text-align: center; }
        .timer-btn.active { background: var(--accent); color: #000; font-weight: bold; border-color: #fff; }

        /* ミッションオーバーレイ */
        #mission-overlay { position: fixed; top: 0; left: 0; width: 100dvw; height: 100dvh; background-image: url('https://images.unsplash.com/photo-1590710667464-9b8830b42784?q=80&w=1200'); background-size: cover; background-position: center; z-index: 100; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .overlay-content { background-color: rgba(0,0,0,0.85); width: 92%; height: 92%; border-radius: 10px; padding: 15px; overflow-y: auto; box-sizing: border-box; border: 1px solid #444; }
        .mission-header { color: var(--accent); font-weight: bold; font-size: 1.1rem; text-align: center; margin-bottom: 10px; border-bottom: 2px solid var(--accent); position: sticky; top: 0; background: rgba(0,0,0,0.9); padding: 5px; z-index: 10; }
        .mission-item { margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .mission-title-row { font-weight: bold; color: #fff; font-size: 12px; display: flex; justify-content: space-between; align-items: center; }
        .mission-label { color: var(--accent); font-size: 13px; margin: 5px 0; background: rgba(255,174,0,0.15); padding: 4px 8px; border-radius: 4px; display: inline-block; }
        .mission-desc { color: #ddd; font-size: 11px; line-height: 1.4; }
        .important-note { background: #600; color: #fff; padding: 10px; font-size: 10px; margin-top: 15px; border-radius: 4px; border: 1px solid #a00; }

        #status-msg { position: fixed; bottom: 5px; width: 100%; text-align: center; font-size: 9px; color: #555; pointer-events: none; }
        canvas { display: none; }
    </style>
</head>
<body>

    <div class="left-section">
        <div class="viewfinder-container"><video id="video" autoplay playsinline></video></div>
        <div id="timer-display">5</div>
    </div>

    <div class="mid-section">
        <div class="tool-group">
            <select id="carSelect" class="car-select">
                <option value="A">Aチーム ミッション</option>
                <option value="B">Bチーム ミッション</option>
                <option value="C">Cチーム ミッション</option>
            </select>
            <button class="sub-btn" id="missionBtn">ミッション確認</button>
            <button class="sub-btn" id="flashBtn">FLASH OFF</button>
            <button class="sub-btn" id="switchBtn">カメラ切り替え</button>
            <button class="sub-btn" id="powerBtn">CAMERA ON</button>
            <div style="text-align: center; margin-top:10px;">
                <label style="font-size:8px; color:#aaa;">ZOOM</label><br>
                <input type="range" id="zoomRange" min="1" max="3" step="0.1" value="1">
            </div>
        </div>
    </div>

    <div class="right-section">
        <div class="counter-group" id="resetTrigger">
            <div class="counter" id="counter">34</div>
            <div class="counter-label">REMAINING</div>
        </div>
        <div class="shutter-box">
            <button id="shutter"></button>
            <button class="timer-btn" id="timerBtn">５秒タイマー</button>
        </div>
    </div>

    <div id="mission-overlay">
        <div class="overlay-content">
            <div id="mission-target-car" class="mission-header">Aチーム MISSION LIST</div>
            <div id="mission-list"></div>
            <div class="important-note">
                【重要：フォトグランプリ必勝法】<br>
                ・室内/夜間/車内は必ずフラッシュをONに！<br>
                ・撮影前にレンズ周辺から指をどかしたか確認！<br>
                ・ピントの限界は1m。近すぎるとボケます。
            </div>
            <div style="text-align: center; color: #888; font-size: 10px; margin: 20px 0;">(タップして閉じる)</div>
        </div>
    </div>

    <div id="status-msg">INITIALIZING...</div>
    <canvas id="canvas"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getStorage, ref, uploadBytes } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // --- Firebase Config（ここを差し替え） ---
        const firebaseConfig = {
            apiKey: "AIzaSyDHqQDeEMrFV09YI0n_ARr1Tzta5aqmE2U",
            authDomain: "my-retro-cam.firebaseapp.com",
            projectId: "my-retro-cam",
            storageBucket: "my-retro-cam.firebasestorage.app",
            messagingSenderId: "700098109654",
            appId: "1:700098109654:web:9d679cbd092c1376642977"
        };

        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);
        const auth = getAuth(app);

        const MAX_SHOTS = 34;
        const CHARGE_TIME = 5000;
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const shutterBtn = document.getElementById('shutter');
        const timerBtn = document.getElementById('timerBtn');
        const flashBtn = document.getElementById('flashBtn');
        const switchBtn = document.getElementById('switchBtn');
        const powerBtn = document.getElementById('powerBtn');
        const carSelect = document.getElementById('carSelect');
        const missionBtn = document.getElementById('missionBtn');
        const resetTrigger = document.getElementById('resetTrigger');
        const missionOverlay = document.getElementById('mission-overlay');
        const missionList = document.getElementById('mission-list');
        const missionTargetCar = document.getElementById('mission-target-car');
        const counterDisplay = document.getElementById('counter');
        const statusMsg = document.getElementById('status-msg');
        const timerDisplay = document.getElementById('timer-display');

        let shotCount = localStorage.getItem('retro_used_count') ? parseInt(localStorage.getItem('retro_used_count')) : 0;
        let selectedCar = localStorage.getItem('retro_selected_car') || null;
        let isFlashOn = false;
        let isCameraOn = false;
        let isTimerActive = false;
        let resetClickCount = 0;
        let currentStream = null;
        let db;
        let isAuthReady = false;

        const missions = {
            "A": [
                { cat: "1. 会議（練習）", title: "【露出実験】", task: "フラッシュなしとありで同じ場所を撮り比べ。光の効果を検証。", num: "3枚" },
                { cat: "2. 移動・昼食", title: "【あーん】", task: "メンバー同士で食べさせ合う仲良しショット。最高の笑顔を。", num: "4枚" },
                { cat: "3. 天に続く道", title: "【ジャンプ】", task: "全員同時に飛び上がり、空に浮いているような飛躍ショット。", num: "3枚" },
                { cat: "4. 買い出し", title: "【大量捕獲】", task: "カゴいっぱいの食材を抱え、強欲な笑顔を見せるハンターショット。", num: "3枚" },
                { cat: "5. フィールドハウス", title: "【森の精霊】", task: "木の陰から顔を覗かせるひょっこりショット。11名が原生林に。", num: "5枚" },
                { cat: "6. 夕食（調理）", title: "【シェフの魂】", task: "プロのような大袈裟な手つきで盛り付ける躍動ショット。", num: "6枚" },
                { cat: "7. 朝の準備", title: "【無防備な朝】", task: "歯ブラシをくわえたまま、ぼーっとしているリアルな寝起き姿。", num: "3枚" },
                { cat: "8. 遊覧船おーろら", title: "【限界耐風】", task: "正面から強風を受け、顔のゆがみを恐れず立ち向かう根性ショット。", num: "4枚" },
                { cat: "9. 帰路・空港", title: "【名残惜しさ】", task: "空港の柱にしがみつき、帰りたくないと泣き真似をする惜別ショット。", num: "3枚" }
            ],
            "B": [
                { cat: "1. 会議（練習）", title: "【構図実験】", task: "悪い構え（指入り）と正しい構えを撮り比べ、死角を検証。", num: "3枚" },
                { cat: "2. 移動・昼食", title: "【孤独のグルメ】", task: "料理と真剣に向き合うメンバーを背後から狙う求道者ショット。", num: "4枚" },
                { cat: "3. 天に続く道", title: "【千手観音】", task: "全員が重なり合い、道の一部となるような芸術的ポーズ。", num: "3枚" },
                { cat: "4. 買い出し", title: "【目利き】", task: "成分表示を鋭い目つきでチェックする、こだわり役員ショット。", num: "3枚" },
                { cat: "5. フィールドハウス", title: "【野生の呼吸】", task: "大地に向けて深く深呼吸し、パワーを吸収しているヒーリング。", num: "5枚" },
                { cat: "6. 夕食（乾杯）", title: "【大机の総督】", task: "11人のグラスが並ぶ大机で、端から端まで迫力を出した乾杯。", num: "6枚" },
                { cat: "7. 朝の準備", title: "【出発の敬礼】", task: "コテージを背景にビシッと敬礼し、今日への決意を示すショット。", num: "3枚" },
                { cat: "8. 遊覧船おーろら", title: "【発見！知床】", task: "遠くに何かを見つけ、全員で同じ方向を力強く指さすショット。", num: "4枚" },
                { cat: "9. 帰路・空港", title: "【ミッション完了】", task: "全員でグッドポーズをし、満足げな顔で歩く達成感ショット。", num: "3枚" }
            ],
            "C": [
                { cat: "1. 会議（練習）", title: "【距離実験】", task: "至近距離と適正距離で撮り比べ、ピントの限界を検証せよ。", num: "3枚" },
                { cat: "2. 移動・昼食", title: "【CM出演依頼】", task: "最高の笑顔でグルメをアピールする広告風ショット。キメろ。", num: "4枚" },
                { cat: "3. 天に続く道", title: "【遠近法】", task: "遠くのメンバーを指でつまむ、または手のひらに乗せる錯覚。", num: "3枚" },
                { cat: "4. 買い出し", title: "【潜入スタッフ】", task: "看板や店員さんと一体化し、スタッフになりすます潜入ショット。", num: "3枚" },
                { cat: "5. フィールドハウス", title: "【自然への対話】", task: "巨大な木や石に深々とお辞儀をし、敬意を払っているシュールな1枚。", num: "5枚" },
                { cat: "6. 夕食（対談）", title: "【次代への絆】", task: "お酒を片手に肩を組み、これまでの苦労を労い合う戦友ショット。", num: "6枚" },
                { cat: "7. 朝の準備", title: "【爽やかモデル】", task: "朝日に照らされ、雑誌の表紙のようなキメ顔でコーヒーを飲む。", num: "3枚" },
                { cat: "8. 遊覧船おーろら", title: "【知床の王】", task: "船首で仁王立ちし、海を支配したかのような支配者ショット。", num: "4枚" },
                { cat: "9. 帰路・空港", title: "【また会おう】", task: "背中を向け、片手だけを挙げてゲートへ消えていく別れの美学。", num: "3枚" }
            ]
        };

        const dbRequest = indexedDB.open("RetroCamDB", 1);
        dbRequest.onsuccess = (e) => { db = e.target.result; };
        dbRequest.onupgradeneeded = (e) => {
            db = e.target.result;
            if (!db.objectStoreNames.contains("pendingUploads")) db.createObjectStore("pendingUploads", { keyPath: "id", autoIncrement: true });
        };

        onAuthStateChanged(auth, (user) => {
            if (user) { isAuthReady = true; statusMsg.innerText = "AUTH OK"; syncOfflineData(); }
            else { signInAnonymously(auth); }
        });

        window.onload = () => { 
            if (selectedCar) { carSelect.value = selectedCar; carSelect.disabled = true; }
            startCamera(); updateUI(); 
        };

        resetTrigger.addEventListener('click', () => {
            resetClickCount++;
            if (resetClickCount >= 5) {
                if(confirm("全リセット（枚数・チーム・ロック解除）しますか？")) {
                    shotCount = 0; selectedCar = null;
                    localStorage.setItem('retro_used_count', 0); localStorage.removeItem('retro_selected_car');
                    carSelect.disabled = false; updateUI();
                }
                resetClickCount = 0;
            }
            setTimeout(() => { resetClickCount = 0; }, 2000);
        });

        missionBtn.addEventListener('click', () => {
            const teamId = carSelect.value;
            if (!selectedCar) { selectedCar = teamId; localStorage.setItem('retro_selected_car', teamId); carSelect.disabled = true; }
            missionTargetCar.innerText = `${teamId}チーム MISSION LIST`;
            missionList.innerHTML = '';
            missions[teamId].forEach(m => {
                const div = document.createElement('div');
                div.className = 'mission-item';
                div.innerHTML = `<div class="mission-title-row"><span>${m.cat}</span><span>${m.num}</span></div><div class="mission-label">${m.title}</div><div class="mission-desc">${m.task}</div>`;
                missionList.appendChild(div);
            });
            missionOverlay.style.display = 'flex';
        });

        missionOverlay.addEventListener('click', () => { missionOverlay.style.display = 'none'; });

        async function startCamera() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: false });
                currentStream = s; video.srcObject = s; isCameraOn = true; updatePowerBtnUI();
                if (isFlashOn) toggleTorch(true);
                statusMsg.innerText = "READY";
            } catch (e) { statusMsg.innerText = "CAMERA ERROR"; isCameraOn = false; updatePowerBtnUI(); }
        }

        function stopCamera() { if (currentStream) { currentStream.getTracks().forEach(t => t.stop()); video.srcObject = null; currentStream = null; } isCameraOn = false; updatePowerBtnUI(); statusMsg.innerText = "CAMERA OFF"; }
        powerBtn.addEventListener('click', () => { if (isCameraOn) stopCamera(); else startCamera(); });

        function updatePowerBtnUI() {
            if (isCameraOn) {
                powerBtn.innerText = "CAMERA ON"; powerBtn.classList.remove('power-off');
                shutterBtn.disabled = shotCount >= MAX_SHOTS; timerBtn.disabled = false;
            } else {
                powerBtn.innerText = "CAMERA OFF"; powerBtn.classList.add('power-off');
                shutterBtn.disabled = true; timerBtn.disabled = true;
            }
        }

        async function toggleTorch(on) { if (!currentStream) return; const t = currentStream.getVideoTracks()[0]; if (t.getCapabilities().torch) await t.applyConstraints({ advanced: [{ torch: on }] }); }

        flashBtn.addEventListener('click', () => {
            if (!isCameraOn) return;
            isFlashOn = !isFlashOn;
            flashBtn.innerText = isFlashOn ? "FLASH ON" : "FLASH OFF";
            flashBtn.classList.toggle('flash-on', isFlashOn);
            toggleTorch(isFlashOn);
        });

        timerBtn.addEventListener('click', () => { if (!isCameraOn) return; isTimerActive = !isTimerActive; timerBtn.classList.toggle('active', isTimerActive); });

        shutterBtn.addEventListener('click', () => {
            if (!isCameraOn || shutterBtn.disabled) return;
            if (isTimerActive) {
                let tl = 5; timerDisplay.innerText = tl; timerDisplay.style.visibility = "visible";
                const c = setInterval(() => { tl--; timerDisplay.innerText = tl; if (tl <= 0) { clearInterval(c); timerDisplay.style.visibility = "hidden"; takePicture(); isTimerActive = false; timerBtn.classList.remove('active'); } }, 1000);
            } else takePicture();
        });

        function takePicture() {
            if (shotCount >= MAX_SHOTS || !isCameraOn) return;
            shutterBtn.disabled = true;
            setTimeout(() => { if (MAX_SHOTS - shotCount > 0 && isCameraOn) shutterBtn.disabled = false; }, CHARGE_TIME);
            const ctx = canvas.getContext('2d');
            const vW = video.videoWidth; const vH = video.videoHeight;
            let tw, th; if (vW / vH > 1.5) { th = vH; tw = vH * 1.5; } else { tw = vW; th = vW / 1.5; }
            canvas.width = tw; canvas.height = th;
            const z = parseFloat(document.getElementById('zoomRange').value);
            const sw = tw / z; const sh = th / z;
            const sx = (vW - sw) / 2; const sy = (vH - sh) / 2;
            ctx.drawImage(video, sx, sy, sw, sh, 0, 0, tw, th);
            applyRetroEffects(ctx, tw, th, isFlashOn);
            addTimestamp(ctx, tw, th);
            canvas.toBlob((b) => {
                db.transaction(["pendingUploads"], "readwrite").objectStore("pendingUploads").add({ blob: b, timestamp: Date.now() });
                uploadImage(b);
            }, 'image/jpeg', 1.0);
            shotCount++; localStorage.setItem('retro_used_count', shotCount); updateUI();
        }

        async function uploadImage(b) {
            if (!navigator.onLine || !isAuthReady) return;
            try { await uploadBytes(ref(storage, `photos/${Date.now()}.jpg`), b); statusMsg.innerText = "READY"; syncOfflineData(true); return true; }
            catch (e) { return false; }
        }

        async function syncOfflineData(del = false) {
            if (!navigator.onLine || !db || !isAuthReady) return;
            const s = db.transaction(["pendingUploads"], "readwrite").objectStore("pendingUploads");
            const r = s.getAll(); r.onsuccess = async () => {
                const i = r.result; if (i.length === 0) return;
                if (del) { db.transaction(["pendingUploads"], "readwrite").objectStore("pendingUploads").delete(i[0].id); return; }
                for (const x of i) { if (await uploadImage(x.blob)) db.transaction(["pendingUploads"], "readwrite").objectStore("pendingUploads").delete(x.id); else break; }
            };
        }

        function applyRetroEffects(ctx, w, h, f) {
            ctx.globalCompositeOperation = 'overlay'; ctx.fillStyle = f ? 'rgba(255, 255, 255, 0.2)' : 'rgba(255, 160, 50, 0.1)'; ctx.fillRect(0, 0, w, h);
            ctx.globalCompositeOperation = 'source-over'; ctx.fillStyle = 'rgba(255, 255, 255, 0.03)'; for (let i = 0; i < (w * h) / 1500; i++) ctx.fillRect(Math.random() * w, Math.random() * h, 1, 1);
            const g = ctx.createRadialGradient(w/2, h/2, w/3, w/2, h/2, w/0.9); g.addColorStop(0, 'transparent'); g.addColorStop(1, 'rgba(0,0,0,0.4)'); ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);
        }

        function addTimestamp(ctx, w, h) {
            const n = new Date();
            const s = `${n.getFullYear().toString().slice(-2)}.${(n.getMonth()+1).toString().padStart(2, '0')}.${n.getDate().toString().padStart(2, '0')} ${n.getHours().toString().padStart(2, '0')}:${n.getMinutes().toString().padStart(2, '0')}`;
            ctx.font = `bold ${Math.floor(w * 0.045)}px "Courier New", monospace`; ctx.textAlign = 'right'; ctx.fillStyle = '#ff7b00'; ctx.shadowColor = 'rgba(255, 100, 0, 0.5)'; ctx.shadowBlur = 5; ctx.fillText(s, w * 0.95, h * 0.95);
        }

        function updateUI() { const rem = MAX_SHOTS - shotCount; counterDisplay.innerText = rem > 0 ? rem : 0; if (rem <= 0 && isCameraOn) shutterBtn.disabled = true; }
        
        switchBtn.addEventListener('click', () => { if (!isCameraOn) return; startCamera(); });
        document.getElementById('zoomRange').addEventListener('input', (e) => video.style.setProperty('--zoom-level', e.target.value));
        window.addEventListener('online', () => syncOfflineData());
    </script>
</body>
</html>
