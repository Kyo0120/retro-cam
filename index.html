<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Retro Cam - Landscape</title>
    <style>
        :root { --body-bg: #1a1a1a; --accent: #ffae00; --panel-bg: #2a2a2a; }
        body { 
            margin: 0; padding: 0; background-color: var(--body-bg); color: white; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; height: 100dvh; overflow: hidden; 
            /* 横向き専用のレイアウト */
            flex-direction: row; align-items: stretch;
        }

        /* --- 左側：ファインダーエリア --- */
        .viewfinder-section {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            position: relative; padding: 10px; padding-left: env(safe-area-inset-left);
        }
        .viewfinder-container { 
            width: 240px; height: 160px; /* 覗き穴サイズ */
            border: 5px solid #333; border-radius: 4px; 
            overflow: hidden; background: #000; position: relative;
            box-shadow: inset 0 0 15px #000;
        }
        video { 
            width: 100%; height: 100%; object-fit: cover; 
            transform: scale(var(--zoom-level, 1)); transform-origin: center;
        }
        video.selfie { transform: scale(var(--zoom-level, 1)) scaleX(-1); }

        /* タイマーカウントダウン（プレビューの外・右下） */
        #timer-display {
            position: absolute; bottom: 5px; right: 5px;
            font-size: 2.5rem; color: var(--accent); font-weight: bold;
            visibility: hidden; text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }

        /* --- 右側：操作パネルエリア --- */
        .controls-section {
            width: 160px; background-color: var(--panel-bg);
            display: flex; flex-direction: column;
            align-items: center; justify-content: space-around;
            padding: 15px 10px; padding-right: env(safe-area-inset-right);
            border-left: 2px solid #111;
        }

        /* 枚数カウンター */
        .counter-group { text-align: center; }
        .counter { font-size: 2rem; color: var(--accent); font-weight: bold; line-height: 1; }
        .counter-label { font-size: 10px; color: #aaa; }

        /* ツールボタン群 */
        .tool-box { width: 100%; display: flex; flex-direction: column; gap: 8px; align-items: center; }
        input[type=range] { width: 100px; accent-color: var(--accent); margin-bottom: 5px;}
        .sub-btn { background: #444; color: #eee; border: 1px solid #666; padding: 7px; border-radius: 4px; font-size: 10px; cursor: pointer; width: 80%; }
        
        /* フラッシュON時のスタイル */
        .flash-on { background: var(--accent) !important; color: #000 !important; font-weight: bold; }
        /* カメラOFF時のスタイル */
        .power-off { background: #d00 !important; font-weight: bold; }

        /* シャッターボタンエリア */
        .shutter-group { position: relative; }
        #shutter { width: 80px; height: 80px; border-radius: 50%; border: 5px solid #222; background: #d00; box-shadow: 0 5px 0 #600; cursor: pointer; }
        #shutter:disabled { background: #444; box-shadow: none; filter: grayscale(100%); opacity: 0.5; }
        
        .timer-btn { background: #555; color: white; border: 2px solid #777; padding: 6px 10px; border-radius: 8px; font-size: 10px; cursor: pointer; position: absolute; top: -15px; right: -15px; }

        /* ステータスバー（最下部） */
        #status-msg { font-size: 10px; color: #888; text-align: center; width: 90%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: auto;}
        canvas { display: none; }
    </style>
</head>
<body>

    <div class="viewfinder-section">
        <div class="viewfinder-container">
            <video id="video" autoplay playsinline></video>
        </div>
        <div id="timer-display">5</div>
    </div>

    <div class="controls-section">
        <div class="counter-group">
            <div class="counter" id="counter">30</div>
            <div class="counter-label">REMAINING</div>
        </div>
        
        <div class="tool-box">
            <div>
                <label style="font-size:10px; color:#aaa;">ZOOM</label><br>
                <input type="range" id="zoomRange" min="1" max="3" step="0.1" value="1">
            </div>
            <button class="sub-btn" id="switchBtn">カメラ切り替え</button>
            <button class="sub-btn" id="flashBtn">FLASH OFF</button>
            <button class="sub-btn" id="powerBtn">CAMERA ON</button>
        </div>

        <div class="shutter-group">
            <button id="shutter"></button>
            <button class="timer-btn" id="timerBtn">5s T</button>
        </div>
        
        <div id="status-msg">INITIALIZING...</div>
    </div>

    <canvas id="canvas"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getStorage, ref, uploadBytes } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // --- Firebase Config（ここを差し替えてください） ---
        const firebaseConfig = {
            apiKey: "AIzaSyDHqQDeEMrFV09YI0n_ARr1Tzta5aqmE2U",
            authDomain: "my-retro-cam.firebaseapp.com",
            projectId: "my-retro-cam",
            storageBucket: "my-retro-cam.firebasestorage.app",
            messagingSenderId: "700098109654",
            appId: "1:700098109654:web:9d679cbd092c1376642977"
        };

        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);
        const auth = getAuth(app);

        const MAX_SHOTS = 30;
        const CHARGE_TIME = 5000;
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const shutterBtn = document.getElementById('shutter');
        const timerBtn = document.getElementById('timerBtn');
        const flashBtn = document.getElementById('flashBtn');
        const switchBtn = document.getElementById('switchBtn');
        const powerBtn = document.getElementById('powerBtn');
        const counterDisplay = document.getElementById('counter');
        const statusMsg = document.getElementById('status-msg');
        const timerDisplay = document.getElementById('timer-display');

        let shotCount = localStorage.getItem('retro_used_count') ? parseInt(localStorage.getItem('retro_used_count')) : 0;
        let currentFacingMode = "environment";
        let isFlashOn = false;
        let isCameraOn = false; // カメラの電源状態
        let currentStream = null;
        let db;
        let isAuthReady = false;

        // IndexedDB
        const dbRequest = indexedDB.open("RetroCamDB", 1);
        dbRequest.onsuccess = (e) => { db = e.target.result; };
        dbRequest.onupgradeneeded = (e) => {
            db = e.target.result;
            if (!db.objectStoreNames.contains("pendingUploads")) db.createObjectStore("pendingUploads", { keyPath: "id", autoIncrement: true });
        };

        // 認証監視
        onAuthStateChanged(auth, (user) => {
            if (user) { isAuthReady = true; statusMsg.innerText = "AUTH OK"; syncOfflineData(); }
            else { signInAnonymously(auth); }
        });

        window.onload = () => {
            startCamera(); // 起動時はON
            updateUI();
        };

        // カメラを起動する関数
        async function startCamera() {
            statusMsg.innerText = "STARTING CAMERA...";
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: currentFacingMode, width: { ideal: 1920 }, height: { ideal: 1080 } },
                    audio: false
                });
                currentStream = stream;
                video.srcObject = stream;
                video.classList.toggle('selfie', currentFacingMode === "user");
                isCameraOn = true;
                updatePowerBtnUI();
                if (isFlashOn && currentFacingMode === "environment") toggleTorch(true);
                statusMsg.innerText = isAuthReady ? "READY" : "AUTH PENDING...";
            } catch (err) { statusMsg.innerText = "CAMERA ERROR"; isCameraOn = false; updatePowerBtnUI(); }
        }

        // カメラを完全に停止する関数（バッテリー節約）
        function stopCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
                currentStream = null;
            }
            isCameraOn = false;
            updatePowerBtnUI();
            statusMsg.innerText = "CAMERA OFF";
        }

        // 電源ボタンのクリック処理
        powerBtn.addEventListener('click', () => {
            if (isCameraOn) stopCamera();
            else startCamera();
        });

        // 電源ボタンの見た目を更新
        function updatePowerBtnUI() {
            if (isCameraOn) {
                powerBtn.innerText = "CAMERA ON";
                powerBtn.classList.remove('power-off');
                shutterBtn.disabled = shotCount >= MAX_SHOTS ? true : false;
                timerBtn.disabled = false;
            } else {
                powerBtn.innerText = "CAMERA OFF";
                powerBtn.classList.add('power-off');
                shutterBtn.disabled = true;
                timerBtn.disabled = true;
            }
        }

        // カメラ切り替え（電源ONの時だけ動作）
        switchBtn.addEventListener('click', () => {
            if (!isCameraOn) return;
            currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
            startCamera(); // 再起動
        });

        // 撮影処理
        function takePicture() {
            if (shotCount >= MAX_SHOTS || !isCameraOn) return;
            shutterBtn.disabled = true;
            timerBtn.disabled = true;
            setTimeout(() => { if (MAX_SHOTS - shotCount > 0 && isCameraOn) { shutterBtn.disabled = false; timerBtn.disabled = false; } }, CHARGE_TIME);

            const ctx = canvas.getContext('2d');
            const vW = video.videoWidth; const vH = video.videoHeight;
            let tw, th;
            if (vW / vH > 1.5) { th = vH; tw = vH * 1.5; } else { tw = vW; th = vW / 1.5; }
            canvas.width = tw; canvas.height = th;

            const z = parseFloat(document.getElementById('zoomRange').value);
            const sw = tw / z; const sh = th / z;
            const sx = (vW - sw) / 2; const sy = (vH - sh) / 2;

            ctx.drawImage(video, sx, sy, sw, sh, 0, 0, tw, th);
            if (currentFacingMode === "user") {
                const t = document.createElement('canvas'); t.width = tw; t.height = th;
                const tc = t.getContext('2d'); tc.translate(tw, 0); tc.scale(-1, 1);
                tc.drawImage(canvas, 0, 0); ctx.clearRect(0, 0, tw, th); ctx.drawImage(t, 0, 0);
            }
            applyRetroEffects(ctx, tw, th, isFlashOn);
            addTimestamp(ctx, tw, th);

            canvas.toBlob((blob) => {
                const transaction = db.transaction(["pendingUploads"], "readwrite");
                transaction.objectStore("pendingUploads").add({ blob: blob, timestamp: Date.now() });
                uploadImage(blob); // 即座にアップロード試行
            }, 'image/jpeg', 1.0);

            shotCount++;
            localStorage.setItem('retro_used_count', shotCount);
            updateUI();
        }

        // --- アップロードと同期（前回の強力なやつを維持） ---
        async function uploadImage(blob) {
            if (!navigator.onLine || !isAuthReady) return;
            try {
                const fileName = `photos/${Date.now()}_${Math.floor(Math.random()*1000)}.jpg`;
                const fileRef = ref(storage, fileName);
                statusMsg.innerText = "UPLOADING...";
                await uploadBytes(fileRef, blob);
                statusMsg.innerText = "READY";
                // 成功したらPendingを削除
                syncOfflineData(true); 
                return true;
            } catch (e) { statusMsg.innerText = "UPLOAD ERR: " + e.code; return false; }
        }

        async function syncOfflineData(deleteOnly = false) {
            if (!navigator.onLine || !db || !isAuthReady) return;
            const store = db.transaction(["pendingUploads"], "readwrite").objectStore("pendingUploads");
            const request = store.getAll();
            request.onsuccess = async () => {
                const items = request.result;
                if (items.length === 0) return;
                // deleteOnlyモード（アップロード成功直後）なら最古のデータを消すだけ
                if (deleteOnly) {
                    db.transaction(["pendingUploads"], "readwrite").objectStore("pendingUploads").delete(items[0].id);
                    return;
                }
                statusMsg.innerText = `SYNCING ${items.length}...`;
                for (const item of items) {
                    const success = await uploadImage(item.blob);
                    if (success) { db.transaction(["pendingUploads"], "readwrite").objectStore("pendingUploads").delete(item.id); }
                    else break;
                }
                statusMsg.innerText = "READY";
            };
        }

        // --- ツールとUI ---
        async function toggleTorch(on) {
            if (!currentStream || currentFacingMode === "user") return;
            const track = currentStream.getVideoTracks()[0];
            const caps = track.getCapabilities();
            if (caps.torch) await track.applyConstraints({ advanced: [{ torch: on }] });
        }
        flashBtn.addEventListener('click', async () => {
            if (!isCameraOn) return;
            isFlashOn = !isFlashOn;
            flashBtn.innerText = isFlashOn ? "FLASH ON" : "FLASH OFF";
            flashBtn.classList.toggle('flash-on', isFlashOn);
            toggleTorch(isFlashOn);
        });
        timerBtn.addEventListener('click', () => {
            if (!isCameraOn) return;
            let timeLeft = 5; timerBtn.disabled = true; shutterBtn.disabled = true;
            timerDisplay.innerText = timeLeft; timerDisplay.style.visibility = "visible";
            const cd = setInterval(() => { timeLeft--; timerDisplay.innerText = timeLeft; if (timeLeft <= 0) { clearInterval(cd); timerDisplay.style.visibility = "hidden"; takePicture(); } }, 1000);
        });
        function applyRetroEffects(ctx, w, h, flash) { ctx.globalCompositeOperation = 'overlay'; ctx.fillStyle = flash ? 'rgba(255, 255, 255, 0.2)' : 'rgba(255, 160, 50, 0.1)'; ctx.fillRect(0, 0, w, h); ctx.globalCompositeOperation = 'source-over'; ctx.fillStyle = 'rgba(255, 255, 255, 0.03)'; for (let i = 0; i < (w * h) / 1500; i++) ctx.fillRect(Math.random() * w, Math.random() * h, 1, 1); const grad = ctx.createRadialGradient(w/2, h/2, w/3, w/2, h/2, w/0.9); grad.addColorStop(0, 'transparent'); grad.addColorStop(1, 'rgba(0,0,0,0.4)'); ctx.fillStyle = grad; ctx.fillRect(0, 0, w, h); }
        function addTimestamp(ctx, w, h) { const now = new Date(); const timeStr = `${now.getFullYear().toString().slice(-2)}.${(now.getMonth()+1).toString().padStart(2, '0')}.${now.getDate().toString().padStart(2, '0')}  ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`; ctx.font = `bold ${Math.floor(w * 0.045)}px "Courier New", monospace`; ctx.textAlign = 'right'; ctx.fillStyle = '#ff7b00'; ctx.shadowColor = 'rgba(255, 100, 0, 0.5)'; ctx.shadowBlur = 5; ctx.fillText(timeStr, w * 0.95, h * 0.95); }
        function updateUI() { const rem = MAX_SHOTS - shotCount; counterDisplay.innerText = rem > 0 ? rem : 0; if (rem <= 0 && isCameraOn) { shutterBtn.disabled = true; timerBtn.disabled = true; counterDisplay.style.color = "red"; } }
        window.addEventListener('online', () => syncOfflineData());
        document.getElementById('zoomRange').addEventListener('input', (e) => video.style.setProperty('--zoom-level', e.target.value));
    </script>
</body>
</html>
