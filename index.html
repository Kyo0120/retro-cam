<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Retro Cam - Shiretoko 2Days Final Fix</title>
    <style>
        :root { --body-bg: #1a1a1a; --accent: #ffae00; --panel-bg: #252525; }
        body { margin: 0; padding: 0; background-color: var(--body-bg); color: white; font-family: 'Courier New', Courier, monospace; display: flex; height: 100dvh; width: 100dvw; overflow: hidden; flex-direction: row; }

        .left-section { flex: 1.2; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; background: #000; padding-left: env(safe-area-inset-left); }
        .viewfinder-container { width: 180px; height: 120px; border: 2px solid #444; border-radius: 4px; overflow: hidden; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scale(var(--zoom-level, 1)); }
        video.selfie { transform: scale(var(--zoom-level, 1)) scaleX(-1); }

        #mission-guide {
            position: absolute; top: 10px; width: 85%; max-width: 260px; 
            background: rgba(0,0,0,0.85); border: 1px solid var(--accent); border-radius: 5px; 
            padding: 6px 10px; text-align: center; z-index: 10; pointer-events: none; box-sizing: border-box;
        }
        .guide-label { font-size: 8px; color: var(--accent); margin-bottom: 2px; }
        .guide-title { font-size: 11px; font-weight: bold; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .mid-section { width: 200px; background-color: var(--panel-bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; border-left: 1px solid #111; border-right: 1px solid #111; }
        .select-group { width: 90%; display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
        .sub-btn { background: #444; color: #eee; border: 1px solid #666; padding: 10px; border-radius: 6px; font-size: 10px; cursor: pointer; width: 85%; }
        .car-select { background: #000; color: var(--accent); border: 1px solid var(--accent); padding: 8px; border-radius: 4px; font-size: 11px; width: 100%; text-align: center; }
        .active-mode { background: var(--accent) !important; color: #000 !important; font-weight: bold; }

        .right-section { width: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: var(--panel-bg); padding-right: env(safe-area-inset-right); }
        .counter { font-size: 2.5rem; color: var(--accent); font-weight: bold; line-height: 1; }
        #shutter { width: 85px; height: 85px; border-radius: 50%; border: 6px solid #222; background: #d00; box-shadow: 0 6px 0 #600; cursor: pointer; margin-top: 15px; }
        /* 無効化（連写防止中）のスタイル */
        #shutter:disabled { background: #333; box-shadow: none; opacity: 0.3; cursor: default; }
        
        #mission-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; display: none; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        #status-msg { position: fixed; bottom: 5px; width: 100%; text-align: center; font-size: 9px; color: #888; pointer-events: none; }
        canvas { display: none; }
    </style>
</head>
<body>

    <div id="mission-overlay">
        <div style="max-width: 500px; margin: 0 auto; color: white;">
            <h2 id="modal-team-name" style="color: var(--accent); border-bottom: 1px solid var(--accent);">MISSION LIST</h2>
            <div id="mission-list-content"></div>
            <p style="text-align: center; font-size: 9px; color: #666; margin-top: 20px;">(タップして閉じる)</p>
        </div>
    </div>

    <div class="left-section">
        <div id="mission-guide">
            <div class="guide-label">CURRENT MISSION</div>
            <div id="guide-title" class="guide-title">設定を選択してください</div>
        </div>
        <div class="viewfinder-container"><video id="video" autoplay playsinline></video></div>
        <div id="timer-display" style="visibility: hidden; position: absolute; font-size: 4rem; color: var(--accent); z-index: 20; font-weight: bold; text-shadow: 0 0 10px #000;">5</div>
    </div>

    <div class="mid-section">
        <div class="select-group">
            <select id="daySelect" class="car-select">
                <option value="">日程を選択</option>
                <option value="1">1日目</option>
                <option value="2">2日目</option>
            </select>
            <select id="carSelect" class="car-select">
                <option value="">チームを選択</option>
                <option value="A">Aチーム</option><option value="B">Bチーム</option><option value="C">Cチーム</option>
            </select>
        </div>
        <button class="sub-btn" id="missionBtn">ミッション一覧</button>
        <button class="sub-btn" id="flashBtn">FLASH OFF</button>
        <button class="sub-btn" id="switchBtn">カメラ切替</button>
        <button class="sub-btn" id="powerBtn">CAMERA ON</button>
        <input type="range" id="zoomRange" min="1" max="3" step="0.1" value="1" style="width:80%; accent-color: var(--accent);">
    </div>

    <div class="right-section">
        <div id="resetTrigger" style="text-align: center; cursor: pointer;">
            <div class="counter" id="counter">--</div>
            <div style="font-size: 9px; color: #888;">REMAINING</div>
        </div>
        <button id="shutter" disabled></button>
        <button class="sub-btn" id="timerBtn" style="margin-top:15px; width:120px;">5秒タイマー</button>
    </div>

    <div id="status-msg">READY</div>
    <canvas id="canvas"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getStorage, ref, uploadBytes } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        
 // --- 1. Firebase情報を入力してください ---
        const firebaseConfig = {
            apiKey: "AIzaSyDHqQDeEMrFV09YI0n_ARr1Tzta5aqmE2U",
            authDomain: "my-retro-cam.firebaseapp.com",
            projectId: "my-retro-cam",
            storageBucket: "my-retro-cam.firebasestorage.app",
            messagingSenderId: "700098109654",
            appId: "1:700098109654:web:9d679cbd092c1376642977"
        };        
        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);
        const auth = getAuth(app);

        const dbName = "Shiretoko2DaysFinalDB";
        const storeName = "photoQueue";
        let db, isAuthReady = false, stream = null;
        const dbRequest = indexedDB.open(dbName, 1);
        dbRequest.onupgradeneeded = e => e.target.result.createObjectStore(storeName, { keyPath: "id", autoIncrement: true });
        dbRequest.onsuccess = e => { db = e.target.result; syncPhotos(); };

       
        // --- ミッションデータ設定 ---
        const config = {
            "1": {
                maxShots: 20,
                missions: {
                    "A": [
                        { id: "01", threshold: 17, title: "1.会議：【撮影実験】", task: "フラッシュの有無を検証。指入りと正しい構えを比較検証。50cmと1mでピント限界を検証。" },
                        { id: "02", threshold: 14, title: "2.昼食：【あーん】", task: "メンバー同士の食べさせ合い。" },
                        { id: "03", threshold: 11, title: "3.天道：【ジャンプ】", task: "全員浮遊ショット。" },
                        { id: "04", threshold: 8,  title: "4.買出：【大量捕獲】", task: "食材満載のカゴと笑顔。" },
                        { id: "05", threshold: 4,  title: "5.自然：【森の精霊】", task: "木の陰からひょっこり覗く。" },
                        { id: "06", threshold: 0,  title: "6.夕食：【シェフの魂】", task: "躍動感ある調理シーン。" }
                    ],
                    "B": [
                        { id: "01", threshold: 17, title: "1.会議：【撮影実験】", task: "フラッシュの有無を検証。指入りと正しい構えを比較検証。50cmと1mでピント限界を検証。" },
                        { id: "02", threshold: 14, title: "2.昼食：【孤独のグルメ】", task: "食に真剣に向き合う背中を撮影。" },
                        { id: "03", threshold: 11, title: "3.天道：【千手観音】", task: "全員重なり合う芸術的ポーズ。" },
                        { id: "04", threshold: 8,  title: "4.買出：【目利き】", task: "成分表示をチェックするこだわり姿。" },
                        { id: "05", threshold: 4,  title: "5.自然：【野生の呼吸】", task: "大地に向けてパワー吸収の深呼吸。" },
                        { id: "06", threshold: 0,  title: "6.夕食：【大机の総督】", task: "11名のグラスが並ぶ大迫力乾杯。" }
                    ],
                    "C": [
                        { id: "01", threshold: 17, title: "1.会議：【撮影実験】", task: "フラッシュの有無を検証。指入りと正しい構えを比較検証。50cmと1mでピント限界を検証。" },
                        { id: "02", threshold: 14, title: "2.昼食：【CM出演依頼】", task: "最高の笑顔でグルメをアピール。" },
                        { id: "03", threshold: 11, title: "3.天道：【遠近法】", task: "遠くのメンバーを摘む、または乗せる。" },
                        { id: "04", threshold: 8,  title: "4.買出：【潜入スタッフ】", task: "店員さんと一体化してなりすます。" },
                        { id: "05", threshold: 4,  title: "5.自然：【自然への対話】", task: "巨木や岩にお辞儀をして感謝。" },
                        { id: "06", threshold: 0,  title: "6.夕食：【次代への絆】", task: "肩を組み労い合う戦友ショット。" }
                    ]
                }
            },
            "2": {
                maxShots: 14,
                missions: {
                    "A": [
                        { id: "07", threshold: 11, title: "7.朝食：【無防備な朝】", task: "リアルな寝起き姿。" },
                        { id: "08", threshold: 7, title: "8.遊覧船：【限界耐風】", task: "強風に立ち向かう根性顔。" },
                        { id: "09", threshold: 4, title: "7.昼食：【完食の証】", task: "食べ終わった後の、米粒一つ残っていない「空っぽの皿」を背景に、満足げな表情で爪楊枝を使う（またはお茶を飲む）姿。" },
                        { id: "10", threshold: 0, title: "9.空港：【名残惜しさ】", task: "帰りたくない泣き真似。" }
                    ],
                    "B": [
                        { id: "07", threshold: 11, title: "7.朝食：【出発の敬礼】", task: "今日への決意の礼。" },
                        { id: "08", threshold: 7, title: "8.遊覧船：【発見！知床】", task: "全員で同じ方向を指差す。" },
                        { id: "09", threshold: 4, title: "7.昼食：【完食の証】", task: "食べ終わった後の、米粒一つ残っていない「空っぽの皿」を背景に、満足げな表情で爪楊枝を使う（またはお茶を飲む）姿。" },
                        { id: "10", threshold: 0, title: "9.空港：【任務完了】", task: "満足げなサムズアップ。" }
                    ],
                    "C": [
                        { id: "07", threshold: 11, title: "7.朝食：【爽やかモデル】", task: "朝日とコーヒーで大人の余裕。" },
                        { id: "08", threshold: 7, title: "8.遊覧船：【知床の王】", task: "船首で仁王立ちショット。" },
                        { id: "09", threshold: 4, title: "8.遊覧船：【知床の風を感じて】", task: "屋外や窓際の場合、料理を片手に遠くの海や山を見つめ、「俺たちはまだ、知床にいる…」という遠い目をする。" },
                        { id: "10", threshold: 0, title: "9.空港：【また会おう】", task: "ゲートへ消えるヒーローの別れ。" }
                    ]
                }
            }
        };

        const daySelect = document.getElementById('daySelect');
        const carSelect = document.getElementById('carSelect');
        const counterDisplay = document.getElementById('counter');
        const shutterBtn = document.getElementById('shutter');
        const guideTitle = document.getElementById('guide-title');
        const statusMsg = document.getElementById('status-msg');
        
        let selectedDay = localStorage.getItem('retro_day') || "";
        let selectedCar = localStorage.getItem('retro_car') || "";
        let shotCount = 0;
        let isFlashOn = false, isCameraOn = false, isTimerActive = false, isCapturing = false;
        let currentFacingMode = "environment";
        let resetClickCount = 0;

        onAuthStateChanged(auth, (u) => { if(u) { isAuthReady=true; syncPhotos(); } else signInAnonymously(auth); });

        window.onload = () => {
            if(selectedDay && selectedCar) {
                daySelect.value = selectedDay; daySelect.disabled = true;
                carSelect.value = selectedCar; carSelect.disabled = true;
                loadCount();
            }
            startCamera(); updateUI();
        };

        function loadCount() {
            if(!selectedDay || !selectedCar) return;
            const key = `retro_count_D${selectedDay}_${selectedCar}`;
            shotCount = parseInt(localStorage.getItem(key)) || 0;
        }

        function updateUI() {
            if(!selectedDay || !selectedCar) {
                counterDisplay.innerText = "--";
                guideTitle.innerText = "日程とチームを選択してください";
                shutterBtn.disabled = true;
                return;
            }
            const dayConf = config[selectedDay];
            const remaining = dayConf.maxShots - shotCount;
            counterDisplay.innerText = remaining > 0 ? remaining : 0;
            
            const mList = dayConf.missions[selectedCar];
            const current = mList.find(m => remaining > m.threshold);
            guideTitle.innerText = current ? current.title : "ミッション完了！";
            
            // 撮影中でなく、枚数が残っていればボタン有効
            shutterBtn.disabled = (isCapturing || remaining <= 0 || !isCameraOn);
        }

        daySelect.onchange = carSelect.onchange = () => {
            if(daySelect.value && carSelect.value) {
                selectedDay = daySelect.value;
                selectedCar = carSelect.value;
                localStorage.setItem('retro_day', selectedDay);
                localStorage.setItem('retro_car', selectedCar);
                daySelect.disabled = carSelect.disabled = true;
                loadCount(); updateUI();
            }
        };

        async function startCamera() {
            if (stream) stream.getTracks().forEach(t => t.stop());
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode, width: { ideal: 1920 }, height: { ideal: 1080 } } });
                document.getElementById('video').srcObject = stream;
                isCameraOn = true; updateUI();
            } catch (e) { statusMsg.innerText = "CAMERA ERROR"; }
        }

        shutterBtn.onclick = () => {
            if (isCapturing || shutterBtn.disabled) return;
            isCapturing = true; 
            shutterBtn.disabled = true; // 即座に無効化

            if (isTimerActive) {
                let c = 5; document.getElementById('timer-display').innerText = c;
                document.getElementById('timer-display').style.visibility = "visible";
                const itv = setInterval(() => {
                    c--; if(c>0) document.getElementById('timer-display').innerText = c;
                    else { 
                        clearInterval(itv); 
                        document.getElementById('timer-display').style.visibility="hidden"; 
                        executeCapture(); 
                        isTimerActive=false; 
                        document.getElementById('timerBtn').classList.remove('active-mode'); 
                    }
                }, 1000);
            } else {
                executeCapture();
            }
        };

        function executeCapture() {
            takePicture();
            statusMsg.innerText = "CHARGING...";
            // 3秒後にロック解除
            setTimeout(() => {
                isCapturing = false;
                statusMsg.innerText = "READY";
                updateUI();
            }, 3000);
        }

        function takePicture() {
            const targetW = 1500, targetH = 1000;
            const canvas = document.getElementById('canvas');
            canvas.width = targetW; canvas.height = targetH;
            const ctx = canvas.getContext('2d');
            const v = document.getElementById('video');
            const vw = v.videoWidth, vh = v.videoHeight;
            const zoom = parseFloat(document.getElementById('zoomRange').value);
            let sH = vh / zoom, sW = (sH * 1.5);
            if (sW > vw) { sW = vw / zoom; sH = sW / 1.5; }
            const sX = (vw - sW) / 2, sY = (vh - sH) / 2;

            ctx.drawImage(v, sX, sY, sW, sH, 0, 0, targetW, targetH);
            applyEffects(ctx, targetW, targetH);
            addStamps(ctx, targetW, targetH);

            canvas.toBlob(async (blob) => {
                const now = new Date();
                const timeStr = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}-${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}${String(now.getSeconds()).padStart(2,'0')}`;
                const mList = config[selectedDay].missions[selectedCar];
                const dayConf = config[selectedDay];
                const mID = (mList.find(m => (dayConf.maxShots - shotCount) > m.threshold) || {id:"99"}).id;
                
                const fileName = `Day${selectedDay}_team${selectedCar}_${mID}_${timeStr}.jpg`;

                const tx = db.transaction(storeName, "readwrite");
                tx.objectStore(storeName).add({ blob, fileName });
                
                shotCount++;
                localStorage.setItem(`retro_count_D${selectedDay}_${selectedCar}`, shotCount);
                
                // カウントダウン表示のみ即時更新
                const remaining = dayConf.maxShots - shotCount;
                counterDisplay.innerText = remaining > 0 ? remaining : 0;

                syncPhotos();
            }, 'image/jpeg', 0.85);
        }

        async function syncPhotos() {
            if (!navigator.onLine || !db || !isAuthReady) return;
            const store = db.transaction(storeName, "readwrite").objectStore(storeName);
            const req = store.getAll();
            req.onsuccess = async () => {
                const items = req.result;
                for (const item of items) {
                    try {
                        await uploadBytes(ref(storage, `photos/${item.fileName}`), item.blob);
                        db.transaction(storeName, "readwrite").objectStore(storeName).delete(item.id);
                    } catch (e) { break; }
                }
            };
        }

        function applyEffects(ctx, w, h) {
            ctx.globalCompositeOperation = 'overlay';
            ctx.fillStyle = 'rgba(0, 255, 120, 0.12)'; ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = isFlashOn ? 'rgba(255, 255, 255, 0.2)' : 'rgba(255, 180, 50, 0.15)'; ctx.fillRect(0, 0, w, h);
            ctx.globalCompositeOperation = 'source-over';
            const grain = (w * h) / 1.5; 
            for (let i = 0; i < grain; i++) {
                const x = Math.random() * w, y = Math.random() * h, opacity = Math.random() * 0.08;
                ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`; ctx.fillRect(x, y, 1.2, 1.2);
            }
            const g = ctx.createRadialGradient(w/2, h/2, w/4, w/2, h/2, w/0.8);
            g.addColorStop(0, 'transparent'); g.addColorStop(1, 'rgba(0,0,0,0.6)');
            ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);
        }

        function addStamps(ctx, w, h) {
            const n = new Date();
            const d = `'${n.getFullYear().toString().slice(-2)}.${String(n.getMonth()+1).padStart(2,'0')}.${String(n.getDate()).padStart(2,'0')} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
            const t = `D${selectedDay}-${selectedCar} TEAM`;
            const fs = Math.floor(w * 0.045);
            ctx.font = `bold ${fs}px "Courier New", monospace`;
            ctx.lineWidth = fs/6; ctx.strokeStyle = "rgba(0,0,0,0.8)";
            ctx.textAlign = "right"; ctx.strokeText(d, w*0.95, h*0.95); ctx.fillStyle = "#ff7b00"; ctx.fillText(d, w*0.95, h*0.95);
            ctx.textAlign = "left"; ctx.strokeText(t, w*0.05, h*0.95); ctx.fillText(t, w*0.05, h*0.95);
        }

        document.getElementById('resetTrigger').onclick = () => {
            resetClickCount++;
            if (resetClickCount >= 5) {
                if(confirm("全リセット（日程・チーム・枚数解除）しますか？")) {
                    localStorage.clear(); shotCount = 0; selectedDay = ""; selectedCar = "";
                    daySelect.disabled = carSelect.disabled = false; daySelect.value = carSelect.value = "";
                    updateUI();
                }
                resetClickCount = 0;
            }
            setTimeout(() => { resetClickCount = 0; }, 2000);
        };
        
        document.getElementById('missionBtn').onclick = () => {
            if(!selectedDay || !selectedCar) return;
            const list = document.getElementById('mission-list-content');
            list.innerHTML = "";
            config[selectedDay].missions[selectedCar].forEach(m => {
                const div = document.createElement('div');
                div.innerHTML = `<b style="color:var(--accent)">MISSION ${m.id}: ${m.title}</b><p style="font-size:11px;margin:5px 0 15px 0;">${m.task}</p>`;
                list.appendChild(div);
            });
            document.getElementById('mission-overlay').style.display = "block";
        };
        document.getElementById('mission-overlay').onclick = () => document.getElementById('mission-overlay').style.display = "none";
        document.getElementById('switchBtn').onclick = () => { currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment"; startCamera(); };
        document.getElementById('flashBtn').onclick = () => { isFlashOn = !isFlashOn; flashBtn.innerText = isFlashOn ? "FLASH ON" : "FLASH OFF"; flashBtn.classList.toggle('active-mode', isFlashOn); };
        document.getElementById('timerBtn').onclick = () => { isTimerActive = !isTimerActive; timerBtn.classList.toggle('active-mode', isTimerActive); };
        document.getElementById('powerBtn').onclick = () => { if (isCameraOn) { if (stream) stream.getTracks().forEach(t => t.stop()); isCameraOn = false; } else startCamera(); updateUI(); };
        document.getElementById('zoomRange').oninput = (e) => document.getElementById('video').style.setProperty('--zoom-level', e.target.value);
        window.addEventListener('online', syncPhotos);
    </script>
</body>
</html>
