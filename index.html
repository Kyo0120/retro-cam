<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Cam - Google Photos Link</title>
    <style>
        :root {
            --body-bg: #1a1a1a;
            --panel-bg: #333;
            --accent: #ffae00;
            --google-blue: #4285f4;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--body-bg);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100dvh;
            overflow: hidden;
        }

        /* 150x150の小さなファインダー */
        .viewfinder-container {
            width: 150px;
            height: 150px;
            border: 3px solid #555;
            border-radius: 4px;
            overflow: hidden;
            background: #000;
            position: relative;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(var(--zoom-level, 1));
            transform-origin: center;
        }

        .controls {
            margin-top: 15px;
            text-align: center;
            width: 100%;
        }

        .counter {
            font-size: 1.5rem;
            color: var(--accent);
            margin-bottom: 5px;
        }

        /* Google連携ボタン */
        #auth-btn {
            background-color: var(--google-blue);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            margin-bottom: 15px;
            font-family: sans-serif;
        }
        #auth-btn.linked {
            background-color: #34a853; /* 緑色：連携済み */
        }

        .zoom-control {
            margin-bottom: 20px;
            width: 200px;
            display: inline-block;
        }

        input[type=range] {
            width: 100%;
            accent-color: var(--accent);
        }

        /* シャッターボタン */
        #shutter {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 4px solid #222;
            background: #d00;
            box-shadow: 0 4px 0 #600;
            cursor: pointer;
            display: inline-block;
        }

        #shutter:active {
            transform: translateY(2px);
            box-shadow: none;
        }

        #shutter:disabled {
            background: #444;
            box-shadow: none;
            cursor: not-allowed;
        }

        #preview-container {
            margin-top: 15px;
            width: 150px;
            height: auto;
        }

        img {
            width: 100%;
            border: 2px solid #fff;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }

        .info {
            font-size: 10px;
            color: #888;
            margin-top: 5px;
        }

        canvas { display: none; }
    </style>
</head>
<body>

    <div class="viewfinder-container">
        <video id="video" autoplay playsinline></video>
    </div>

    <div class="controls">
        <div class="counter" id="counter">0 / 30</div>
        
        <button id="auth-btn" onclick="loginToGoogle()">Googleフォトと連携する</button>
        <br>
        
        <div class="zoom-control">
            <label style="font-size: 10px;">ZOOM</label><br>
            <input type="range" id="zoomRange" min="1" max="3" step="0.1" value="1">
        </div>

        <br>
        <button id="shutter"></button>
        <div class="info">SHUTTER</div>
    </div>

    <div id="preview-container"></div>
    <canvas id="canvas"></canvas>

    <script>
        // --- 設定エリア ---
        const CLIENT_ID = '341523960931-58ltfdmmi1l6m2ksjf5s4kga5mlu9sct.apps.googleusercontent.com';
        const SCOPE = 'https://www.googleapis.com/auth/photoslibrary.appendonly';
        const MAX_SHOTS = 30;

        // --- 変数管理 ---
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const shutterBtn = document.getElementById('shutter');
        const counterDisplay = document.getElementById('counter');
        const zoomRange = document.getElementById('zoomRange');
        const previewContainer = document.getElementById('preview-container');
        const authBtn = document.getElementById('auth-btn');

        let accessToken = null;
        let shotCount = localStorage.getItem('retro_shot_count') ? parseInt(localStorage.getItem('retro_shot_count')) : 0;
        let videoTrack = null;

        // --- 1. 初期化と認証チェック ---
        window.addEventListener('load', () => {
            // URLからアクセストークンを抽出 (Googleリダイレクト後)
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            accessToken = params.get('access_token');

            if (accessToken) {
                history.replaceState(null, null, window.location.pathname);
                authBtn.innerText = "✓ Googleフォト連携済み";
                authBtn.classList.add("linked");
            }

            initCamera();
            updateUI();
        });

        // --- 2. カメラ起動 ---
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 4096 }, height: { ideal: 2160 } },
                    audio: false
                });
                video.srcObject = stream;
                videoTrack = stream.getVideoTracks()[0];
                
                // ネイティブズーム対応
                const cap = videoTrack.getCapabilities();
                if (cap.zoom) {
                    zoomRange.min = cap.zoom.min;
                    zoomRange.max = cap.zoom.max;
                    zoomRange.step = cap.zoom.step;
                }
            } catch (err) {
                console.error(err);
                alert("カメラを起動できません。HTTPS環境で試してください。");
            }
        }

        // --- 3. Google認証リダイレクト ---
        function loginToGoogle() {
            const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(window.location.href.split('#')[0])}&response_type=token&scope=${encodeURIComponent(SCOPE)}`;
            window.location.href = authUrl;
        }

        // --- 4. ズーム処理 ---
        zoomRange.addEventListener('input', (e) => {
            const z = e.target.value;
            video.style.setProperty('--zoom-level', z);
            if (videoTrack && videoTrack.applyConstraints) {
                videoTrack.applyConstraints({ advanced: [{ zoom: z }] });
            }
        });

        // --- 5. シャッター処理 ---
        shutterBtn.addEventListener('click', () => {
            if (shotCount >= MAX_SHOTS) return;

            const ctx = canvas.getContext('2d');
            const w = video.videoWidth;
            const h = video.videoHeight;
            canvas.width = w;
            canvas.height = h;

            // デジタルズーム計算
            const z = zoomRange.value;
            const sw = w / z;
            const sh = h / z;
            const sx = (w - sw) / 2;
            const sy = (h - sh) / 2;

            // 描画
            ctx.drawImage(video, sx, sy, sw, sh, 0, 0, w, h);
            
            // 加工
            applyFilmEffects(ctx, w, h);
            addTimestamp(ctx, w, h);

            // Blob（バイナリ）変換
            canvas.toBlob(async (blob) => {
                // Googleフォトへアップロード（トークンがある場合のみ）
                if (accessToken) {
                    uploadToGooglePhotos(blob);
                }

                // プレビュー表示
                const url = URL.createObjectURL(blob);
                displayPreview(url);
            }, 'image/jpeg', 0.9);

            shotCount++;
            localStorage.setItem('retro_shot_count', shotCount);
            updateUI();
        });

        // --- 6. Googleフォトアップロード関数 ---
        async function uploadToGooglePhotos(blob) {
            try {
                // ステップA: データのアップロード
                const uploadRes = await fetch('https://photoslibrary.googleapis.com/v1/uploads', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-type': 'application/octet-stream',
                        'X-Goog-Upload-Protocol': 'raw'
                    },
                    body: blob
                });
                const uploadToken = await uploadRes.text();

                // ステップB: ライブラリへの登録
                await fetch('https://photoslibrary.googleapis.com/v1/mediaItems:batchCreate', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-type': 'application/json'
                    },
                    body: JSON.stringify({
                        "newMediaItems": [{
                            "description": "Retro Cam Photo",
                            "simpleMediaItem": { "uploadToken": uploadToken }
                        }]
                    })
                });
                console.log("Googleフォトへ保存完了");
            } catch (err) {
                console.error("Upload failed", err);
            }
        }

        // --- 7. その他補助関数 ---
        function applyFilmEffects(ctx, w, h) {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
            for (let i = 0; i < (w * h) / 2000; i++) {
                ctx.fillRect(Math.random() * w, Math.random() * h, 1, 1);
            }
            ctx.globalCompositeOperation = 'multiply';
            ctx.fillStyle = 'rgba(255, 220, 180, 0.2)';
            ctx.fillRect(0, 0, w, h);
            ctx.globalCompositeOperation = 'source-over';
        }

        function addTimestamp(ctx, w, h) {
            const now = new Date();
            const dateStr = `${now.getFullYear().toString().slice(-2)}.${(now.getMonth()+1).toString().padStart(2,'0')}.${now.getDate().toString().padStart(2,'0')}`;
            const fontSize = Math.floor(w * 0.05);
            ctx.font = `italic bold ${fontSize}px sans-serif`;
            ctx.fillStyle = '#ff8c00';
            ctx.textAlign = 'right';
            ctx.fillText(dateStr, w * 0.95, h * 0.95);
        }

        function displayPreview(url) {
            previewContainer.innerHTML = `<img src="${url}"><br><a href="${url}" download="photo.jpg" style="color:white; font-size:10px;">SAVE TO DEVICE</a>`;
        }

        function updateUI() {
            counterDisplay.innerText = `${shotCount} / ${MAX_SHOTS}`;
            if (shotCount >= MAX_SHOTS) {
                shutterBtn.disabled = true;
                counterDisplay.style.color = "red";
            }
        }
    </script>
</body>
</html>
