<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Cam - Final Fix</title>
    <style>
        :root { --body-bg: #1a1a1a; --accent: #ffae00; }
        body { 
            margin: 0; padding: 0; background-color: var(--body-bg); color: white; 
            font-family: 'Courier New', Courier, monospace; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; 
            height: 100dvh; overflow: hidden; 
        }
        
        .viewfinder-container { 
            width: 240px; height: 160px; border: 3px solid #555; border-radius: 4px; 
            overflow: hidden; background: #000; position: relative;
        }
        video { 
            width: 100%; height: 100%; object-fit: cover; 
            transform: scale(var(--zoom-level, 1)); transform-origin: center;
        }
        /* インカメラ（自撮り）の時だけ鏡のように反転させる */
        video.selfie { transform: scale(var(--zoom-level, 1)) scaleX(-1); }

        .controls { margin-top: 10px; text-align: center; width: 100%; }
        .counter { font-size: 1.8rem; color: var(--accent); font-weight: bold; }
        .counter-label { font-size: 10px; color: #888; margin-bottom: 5px; }

        #auth-btn { background-color: #4285f4; color: white; border: none; padding: 8px 15px; border-radius: 20px; font-size: 10px; margin-bottom: 10px; cursor: pointer; }
        .tool-box { margin-bottom: 40px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        input[type=range] { width: 180px; accent-color: var(--accent); }
        .switch-btn { background: #444; color: #eee; border: 1px solid #666; padding: 10px 20px; border-radius: 4px; font-size: 11px; cursor: pointer; }

        #shutter { width: 80px; height: 80px; border-radius: 50%; border: 5px solid #222; background: #d00; box-shadow: 0 4px 0 #600; cursor: pointer; }
        #shutter:disabled { background: #444; box-shadow: none; filter: grayscale(100%); opacity: 0.5; }
        #loading-msg { font-size: 10px; color: var(--accent); visibility: hidden; margin-top: 10px; height: 12px; }
        canvas { display: none; }
    </style>
</head>
<body>

    <div class="viewfinder-container">
        <video id="video" autoplay playsinline></video>
    </div>

    <div class="controls">
        <div class="counter" id="counter">30</div>
        <div class="counter-label">REMAINING</div>
        <button id="auth-btn">Googleフォトと連携</button>
        
        <div class="tool-box">
            <div>
                <label style="font-size:10px; color:#888;">ZOOM</label><br>
                <input type="range" id="zoomRange" min="1" max="3" step="0.1" value="1">
            </div>
            <button class="switch-btn" id="switchBtn">カメラ切り替え</button>
        </div>

        <button id="shutter"></button>
        <div id="loading-msg">SYNCING...</div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const CLIENT_ID = '341523960931-58ltfdmmi1l6m2ksjf5s4kga5mlu9sct.apps.googleusercontent.com'; 
        const SCOPE = 'https://www.googleapis.com/auth/photoslibrary.appendonly';
        const MAX_SHOTS = 30;

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const shutterBtn = document.getElementById('shutter');
        const switchBtn = document.getElementById('switchBtn');
        const counterDisplay = document.getElementById('counter');
        const zoomRange = document.getElementById('zoomRange');

        let accessToken = null;
        let shotCount = localStorage.getItem('retro_used_count') ? parseInt(localStorage.getItem('retro_used_count')) : 0;
        let currentFacingMode = "environment";
        let currentStream = null;

        window.onload = async () => {
            await initCamera("environment");
            checkAuth();
            updateUI();
        };

        // カメラ初期化関数（エラー対策強化版）
        async function initCamera(facingMode) {
        // 1. ストリームを完全にクリア
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
            }
            
            // 2. 0.8秒待機（iOS Chrome用に少し長めに確保）
            await new Promise(resolve => setTimeout(resolve, 800));
        
            // 3. 最小限の制約でリクエスト
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { exact: (facingMode === "environment" ? "environment" : "user") } },
                    audio: false
                });
                currentStream = stream;
                video.srcObject = stream;
                
                if (facingMode === "user") video.classList.add('selfie');
                else video.classList.remove('selfie');
        
            } catch (err) {
                // 'exact'で失敗した場合は、制約をさらに緩めて再試行
                console.warn("Retrying with loose constraints...");
                try {
                    const fallbackStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: facingMode } });
                    currentStream = fallbackStream;
                    video.srcObject = fallbackStream;
                } catch (e) {
                    console.error("Critical Camera Error:", e);
                    alert("カメラの切り替えが拒否されました。一度ブラウザを完全に閉じて再試行してください。");
                }
            }
        }

        switchBtn.addEventListener('click', async () => {
            currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
            await initCamera(currentFacingMode);
        });

        // --- 以下、Google連携・撮影ロジック（そのまま） ---
        function checkAuth() {
            const params = new URLSearchParams(window.location.hash.substring(1));
            accessToken = params.get('access_token');
            if (accessToken) {
                history.replaceState(null, null, window.location.pathname);
                document.getElementById('auth-btn').innerText = "✓ 連携済み";
                document.getElementById('auth-btn').style.backgroundColor = "#34a853";
            }
        }

        document.getElementById('auth-btn').addEventListener('click', () => {
            const redirectUri = window.location.origin + window.location.pathname;
            window.location.href = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=${encodeURIComponent(SCOPE)}`;
        });

        zoomRange.addEventListener('input', (e) => video.style.setProperty('--zoom-level', e.target.value));

        shutterBtn.addEventListener('click', () => {
            if (shotCount >= MAX_SHOTS) return;
            shutterBtn.disabled = true;
            setTimeout(() => { if (MAX_SHOTS - shotCount > 0) shutterBtn.disabled = false; }, 5000);

            const ctx = canvas.getContext('2d');
            const vW = video.videoWidth;
            const vH = video.videoHeight;
            let tw, th;
            if (vW / vH > 1.5) { th = vH; tw = vH * 1.5; } else { tw = vW; th = vW / 1.5; }
            canvas.width = tw; canvas.height = th;

            const z = parseFloat(zoomRange.value);
            const sw = tw / z; const sh = th / z;
            const sx = (vW - sw) / 2; const sy = (vH - sh) / 2;

            ctx.drawImage(video, sx, sy, sw, sh, 0, 0, tw, th);

            // インカメラの保存画像反転処理
            if (currentFacingMode === "user") {
                const temp = document.createElement('canvas');
                temp.width = tw; temp.height = th;
                const tctx = temp.getContext('2d');
                tctx.translate(tw, 0); tctx.scale(-1, 1);
                tctx.drawImage(canvas, 0, 0);
                ctx.clearRect(0, 0, tw, th);
                ctx.drawImage(temp, 0, 0);
            }

            applyRetroEffects(ctx, tw, th);
            addTimestamp(ctx, tw, th);

            canvas.toBlob(async (blob) => {
                if (accessToken) {
                    document.getElementById('loading-msg').style.visibility = "visible";
                    await uploadToGoogle(blob);
                    document.getElementById('loading-msg').style.visibility = "hidden";
                }
            }, 'image/jpeg', 1.0);

            shotCount++;
            localStorage.setItem('retro_used_count', shotCount);
            updateUI();
        });

        function applyRetroEffects(ctx, w, h) {
            ctx.globalCompositeOperation = 'overlay';
            ctx.fillStyle = 'rgba(255, 160, 50, 0.1)';
            ctx.fillRect(0, 0, w, h);
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.03)';
            for (let i = 0; i < (w * h) / 2000; i++) ctx.fillRect(Math.random() * w, Math.random() * h, 1, 1);
            const grad = ctx.createRadialGradient(w/2, h/2, w/3, w/2, h/2, w/0.9);
            grad.addColorStop(0, 'transparent'); grad.addColorStop(1, 'rgba(0,0,0,0.3)');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, w, h);
        }

        function addTimestamp(ctx, w, h) {
            const now = new Date();
            const timeStr = `${now.getFullYear().toString().slice(-2)}.${(now.getMonth()+1).toString().padStart(2, '0')}.${now.getDate().toString().padStart(2, '0')}  ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
            ctx.font = `bold ${Math.floor(w * 0.04)}px "Courier New", monospace`;
            ctx.textAlign = 'right'; ctx.fillStyle = '#ff7b00';
            ctx.shadowColor = 'rgba(255, 100, 0, 0.5)'; ctx.shadowBlur = 5;
            ctx.fillText(timeStr, w * 0.95, h * 0.95);
        }

        async function uploadToGoogle(blob) {
            try {
                const res = await fetch('https://photoslibrary.googleapis.com/v1/uploads', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-type': 'application/octet-stream', 'X-Goog-Upload-Protocol': 'raw' },
                    body: blob
                });
                const token = await res.text();
                await fetch('https://photoslibrary.googleapis.com/v1/mediaItems:batchCreate', {
                    method: 'POST',
                    headers: { 'Content-type': 'application/json', 'Authorization': `Bearer ${accessToken}` },
                    body: JSON.stringify({ "newMediaItems": [{ "simpleMediaItem": { "uploadToken": token } }] })
                });
            } catch (e) { console.error(e); }
        }

        function updateUI() {
            const rem = MAX_SHOTS - shotCount;
            counterDisplay.innerText = rem > 0 ? rem : 0;
            if (rem <= 0) { shutterBtn.disabled = true; counterDisplay.style.color = "red"; }
        }
    </script>
</body>
</html>
