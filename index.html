<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Retro Cam - Shiretoko Ultra Final</title>
    <style>
        :root { --body-bg: #1a1a1a; --accent: #ffae00; --panel-bg: #252525; }
        body { margin: 0; padding: 0; background-color: var(--body-bg); color: white; font-family: 'Courier New', Courier, monospace; display: flex; height: 100dvh; width: 100dvw; overflow: hidden; }

        /* レイアウト */
        .left-section { flex: 1.2; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-left: env(safe-area-inset-left); position: relative; }
        .viewfinder-container { width: 160px; height: 106px; border: 4px solid #444; border-radius: 4px; overflow: hidden; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scale(var(--zoom-level, 1)); }
        video.selfie { transform: scale(var(--zoom-level, 1)) scaleX(-1); }

        .mid-section { width: 200px; background-color: var(--panel-bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; border-left: 1px solid #111; border-right: 1px solid #111; }
        .right-section { width: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-right: env(safe-area-inset-right); background-color: var(--panel-bg); }

        /* UIパーツ */
        .sub-btn { background: #444; color: #eee; border: 1px solid #666; padding: 12px; border-radius: 6px; font-size: 11px; cursor: pointer; width: 85%; }
        .flash-on { background: var(--accent) !important; color: #000 !important; font-weight: bold; }
        .car-select { background: #000; color: var(--accent); border: 1px solid var(--accent); padding: 10px; border-radius: 4px; font-size: 12px; width: 85%; }
        
        #shutter { width: 90px; height: 90px; border-radius: 50%; border: 6px solid #222; background: #d00; box-shadow: 0 6px 0 #600; cursor: pointer; margin-bottom: 20px; }
        #shutter:active { transform: translateY(3px); box-shadow: 0 3px 0 #600; }
        #shutter:disabled { background: #444; box-shadow: none; opacity: 0.5; }

        .counter { font-size: 2.5rem; color: var(--accent); font-weight: bold; line-height: 1; }
        #status-msg { position: fixed; bottom: 10px; width: 100%; text-align: center; font-size: 10px; color: #888; z-index: 200; }
        
        /* ミッションオーバーレイ */
        #mission-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; display: none; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        canvas { display: none; }
    </style>
</head>
<body>

    <div class="left-section">
        <div class="viewfinder-container"><video id="video" autoplay playsinline></video></div>
        <div id="timer-display" style="visibility: hidden; font-size: 2rem; color: var(--accent);">5</div>
    </div>

    <div class="mid-section">
        <select id="carSelect" class="car-select">
            <option value="A">Aチーム</option><option value="B">Bチーム</option><option value="C">Cチーム</option>
        </select>
        <button class="sub-btn" id="missionBtn">ミッション</button>
        <button class="sub-btn" id="flashBtn">FLASH OFF</button>
        <button class="sub-btn" id="switchBtn">カメラ切替</button>
        <button class="sub-btn" id="powerBtn">CAMERA ON</button>
        <input type="range" id="zoomRange" min="1" max="3" step="0.1" value="1">
    </div>

    <div class="right-section">
        <div class="counter" id="counter">34</div>
        <div style="font-size: 9px; color: #888; margin-bottom: 20px;">REMAINING</div>
        <button id="shutter"></button>
        <button class="sub-btn" id="timerBtn" style="width: 120px;">5秒タイマー</button>
    </div>

    <div id="status-msg">LOADING...</div>
    <div id="mission-overlay"></div>
    <canvas id="canvas"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getStorage, ref, uploadBytes } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Firebase設定
        const firebaseConfig = { apiKey: "AIzaSyDHqQDeEMrFV09YI0n_ARr1Tzta5aqmE2U",
                                authDomain: "my-retro-cam.firebaseapp.com",
                                projectId: "my-retro-cam",
                                storageBucket: "my-retro-cam.firebasestorage.app",
                                messagingSenderId: "700098109654",
                                appId: "1:700098109654:web:9d679cbd092c1376642977"
                               };
        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);
        const auth = getAuth(app);

        // IndexedDB 設定 (オフライン保存用)
        const dbName = "RetroCamDB";
        const storeName = "offline_photos";
        let db;

        const request = indexedDB.open(dbName, 1);
        request.onupgradeneeded = e => e.target.result.createObjectStore(storeName, { keyPath: "id", autoIncrement: true });
        request.onsuccess = e => { db = e.target.result; checkOfflineQueue(); };

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const shutterBtn = document.getElementById('shutter');
        const counterDisplay = document.getElementById('counter');
        const statusMsg = document.getElementById('status-msg');

        let shotCount = parseInt(localStorage.getItem('retro_count')) || 0;
        let selectedCar = localStorage.getItem('retro_car') || null;
        let isFlashOn = false;
        let currentFacingMode = "environment";
        let stream = null;

        window.onload = () => { if(selectedCar) { document.getElementById('carSelect').value = selectedCar; document.getElementById('carSelect').disabled = true; } startCamera(); updateUI(); signInAnonymously(auth); };

        async function startCamera() {
            if(stream) stream.getTracks().forEach(t => t.stop());
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode, width: { ideal: 3840 }, height: { ideal: 2160 } } });
                video.srcObject = stream;
                statusMsg.innerText = "READY";
            } catch(e) { statusMsg.innerText = "ERROR"; }
        }

        // オフラインキューの確認とアップロード
        async function checkOfflineQueue() {
            if (!navigator.onLine || !db) return;
            const tx = db.transaction(storeName, "readwrite");
            const store = tx.objectStore(storeName);
            const request = store.getAll();
            request.onsuccess = async () => {
                const photos = request.result;
                if (photos.length > 0) statusMsg.innerText = `UPLOADING QUEUE (${photos.length})...`;
                for (const photo of photos) {
                    try {
                        await uploadBytes(ref(storage, `photos/${photo.timestamp}.jpg`), photo.blob);
                        db.transaction(storeName, "readwrite").objectStore(storeName).delete(photo.id);
                    } catch (e) { break; }
                }
                statusMsg.innerText = "ALL SYNCED";
            };
        }

        window.addEventListener('online', checkOfflineQueue);

        function takePicture() {
            if (shotCount >= 34) return;
            const ctx = canvas.getContext('2d');
            // 高解像度対応: ビデオの本来のサイズを取得
            const vw = video.videoWidth;
            const vh = video.videoHeight;
            canvas.width = vw;
            canvas.height = vh;
            
            // 描画
            ctx.drawImage(video, 0, 0, vw, vh);
            
            // エフェクト
            applyEffects(ctx, vw, vh);
            
            // 文字の刻印 (視認性アップ)
            const n = new Date();
            const dateStr = `'${n.getFullYear().toString().slice(-2)} ${n.getMonth()+1}/${n.getDate()}`;
            const teamStr = selectedCar ? `${selectedCar} TEAM` : "";
            const fontSize = Math.floor(vw * 0.04);
            
            ctx.font = `bold ${fontSize}px "Courier New", monospace`;
            ctx.textAlign = "right";
            
            // 文字の縁取り
            ctx.strokeStyle = "black";
            ctx.lineWidth = fontSize / 8;
            ctx.strokeText(dateStr, vw * 0.95, vh * 0.95);
            ctx.strokeText(teamStr, vw * 0.95, vh * 0.88);
            
            ctx.fillStyle = "#ff7b00";
            ctx.fillText(dateStr, vw * 0.95, vh * 0.95);
            ctx.fillText(teamStr, vw * 0.95, vh * 0.88);

            canvas.toBlob(async (blob) => {
                const timestamp = Date.now();
                // まずIndexedDBに保存
                const tx = db.transaction(storeName, "readwrite");
                tx.objectStore(storeName).add({ blob, timestamp });
                
                checkOfflineQueue(); // アップロード試行
                
                shotCount++;
                localStorage.setItem('retro_count', shotCount);
                updateUI();
            }, 'image/jpeg', 1.0);
        }

        function applyEffects(ctx, w, h) {
            ctx.globalCompositeOperation = 'overlay';
            ctx.fillStyle = 'rgba(0, 255, 120, 0.08)'; // シネマグリーン
            ctx.fillRect(0, 0, w, h);
            ctx.globalCompositeOperation = 'source-over';
            // ビネット
            const g = ctx.createRadialGradient(w/2, h/2, w/4, w/2, h/2, w/0.8);
            g.addColorStop(0, 'transparent'); g.addColorStop(1, 'rgba(0,0,0,0.6)');
            ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);
        }

        shutterBtn.onclick = takePicture;
        function updateUI() { counterDisplay.innerText = 34 - shotCount; }
        // ... 他のボタン類（カメラ切替、フラッシュ等）のイベントは前回同様に実装
    </script>
</body>
</html>
